<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>MVP</title>

<!-- СТИЛЬ КОНСОЛИ -->

  <link rel="stylesheet"
        href="styles/console.css" />

      
<style>

/* ========================= */
/* СБРОС */
/* ========================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ========================= */
/* BODY */
/* ========================= */

body {

  font-family: Arial, sans-serif;

  height: 100vh;

  display: flex;

  flex-direction: column;

}

/* ========================= */
/* ТИТР */
/* ========================= */

.header {

  width: 100%;

  text-align: center;

  padding: 20px;

  font-size: 36px;

  font-weight: bold;

  background: white;

  z-index: 10;

}

/* ========================= */
/* КОНТЕЙНЕР КАРТИНОК */
/* ========================= */

.images {

  height: 70vh;

  display: flex;

  width: 100%;

  align-items: flex-start;

}

/* ========================= */
/* ЛЕВАЯ / ПРАВАЯ */
/* ========================= */

.image {

  width: 50%;

  height: 100%;

  position: relative;   /* ВОТ ЭТА СТРОКА — ключевая */    

  background-size: contain;

  background-position: top center;

  background-repeat: no-repeat;

}

/* ========================= */
/* ЛЕВАЯ КАРТИНКА */
/* ========================= */

.left {

  background-image: url("https://matmodelator.github.io/Mvp/styles/dating.jpg");

}

/* ========================= */
/* ПРАВАЯ КАРТИНКА */
/* ========================= */

.right {

  background-image: url("https://matmodelator.github.io/Mvp/styles/tennis.jpg");

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 768px) {

  .images {

    flex-direction: column;

    height: 70vh;

  }

  .image {

    width: 100%;

    height: 50%;

  }

}

 /* ========================= */
/* ТИТР-КОНТЕЙНЕР */
/* ========================= */

.header {

  position: relative;

  width: 100%;

  text-align: center;

  padding: 20px;

  font-size: 36px;

  font-weight: bold;

  background: white;

  z-index: 10;

  cursor: pointer;

}

/* ========================= */
/* ВЫПАДАЮЩИЙ БЛОК */
/* ========================= */

.mvp-lines {

  position: absolute;

  top: 100%;

  left: 50%;

  transform: translateX(-50%);

  display: flex;

  flex-direction: column;

  gap: 6px;

  opacity: 0;

  transform-origin: top;

  transition: all 0.3s ease;

  pointer-events: none;

}

/* ========================= */
/* СТРОКИ */
/* ========================= */

.mvp-lines span {

  font-size: 22px;

  font-weight: normal;

  color: #333;

}

/* ========================= */
/* MAIN HOVER */
/* ========================= */

.header:hover .mvp-lines {

  opacity: 1;

  transform: translateX(-50%) translateY(8px);

}    

/* ТЕКСТ НАД КАРТИНКАМИ */

/* ========================= */
/* ЛЕВЫЙ HOVER */
/* ========================= */

.hover-left {

  position: absolute;

  top: 10px;

  left: 60px;

  background: none;

  font-size: 26px;

  font-weight: bold;

  color: black;

  padding: 6px 12px;

  white-space: nowrap;

  overflow: hidden;

  width: 0;

  transition: width 0.4s ease;

}

.left:hover .hover-left {

  width: 360px;

}

/* ========================= */
/* ПРАВЫЙ HOVER */
/* ========================= */

.hover-right {

  position: absolute;

  top: 10px;

  left: 60px;

  background: none;

  font-size: 26px;

  font-weight: bold;

  color: black;

  padding: 6px 12px;

  white-space: nowrap;

  overflow: hidden;

  width: 0;

  transition: width 0.4s ease;

}

.right:hover .hover-right {

  width: 330px;

}


      
</style>

</head>

<body>

<div class="header">

M.V.P
<div class="mvp-lines">

    <span>Most</span>
    <span>Valuable</span>
    <span>Project</span>

  </div>
</div>

<div class="images">

<div class="image left">
  <div class="hover-left">
    Most Valuable Partner
  </div>
</div>

<div class="image right">
  <div class="hover-right">
    Most Valuable Player
  </div>
</div>

</div>





<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

    TWO side hovers - fix err open | v1.2.3

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

      
</body>
</html>
