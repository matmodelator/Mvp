<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>MVP</title>

<style>

/* ========================= */
/* СБРОС */
/* ========================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ========================= */
/* BODY */
/* ========================= */

body {

  font-family: Arial, sans-serif;

  height: 100vh;

  display: flex;

  flex-direction: column;

}

/* ========================= */
/* ТИТР */
/* ========================= */

.header {

  width: 100%;

  text-align: center;

  padding: 20px;

  font-size: 36px;

  font-weight: bold;

  background: white;

  z-index: 10;

}

/* ========================= */
/* КОНТЕЙНЕР КАРТИНОК */
/* ========================= */

.images {

  flex: 1;

  display: flex;

  width: 100%;

}

/* ========================= */
/* ЛЕВАЯ / ПРАВАЯ */
/* ========================= */

.image {

  width: 50%;

  height: 100%;

  background-size: cover;

  background-position: center;

  background-repeat: no-repeat;

}

/* ========================= */
/* ЛЕВАЯ КАРТИНКА */
/* ========================= */

.left {

  background-image: url("https://matmodelator.github.io/Mvp/styles/dating.jpg");

}

/* ========================= */
/* ПРАВАЯ КАРТИНКА */
/* ========================= */

.right {

  background-image: url("https://matmodelator.github.io/Mvp/styles/tennis.jpg");

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 768px) {

  .images {

    flex-direction: column;

  }

  .image {

    width: 100%;

    height: 50%;

  }

}

</style>

</head>

<body>

<div class="header">

MVP

</div>

<div class="images">

<div class="image left"></div>

<div class="image right"></div>

</div>

</body>

</html>
