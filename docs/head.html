<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>MVP</title>

<!-- СТИЛЬ КОНСОЛИ -->

  <link rel="stylesheet"
        href="styles/console.css" />

      
<style>

/* ========================= */
/* СБРОС */
/* ========================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ========================= */
/* BODY */
/* ========================= */

body {

  font-family: Arial, sans-serif;

  height: 100vh;

  display: flex;

  flex-direction: column;

}

/* ========================= */
/* ТИТР */
/* ========================= */

.header {

  width: 100%;

  text-align: center;

  padding: 20px;

  font-size: 36px;

  font-weight: bold;

  background: white;

  z-index: 10;

}

/* ========================= */
/* КОНТЕЙНЕР */
/* ========================= */

.images {

  height: 70vh;

  display: flex;

  width: 100%;

  align-items: flex-start;

}

/* ========================= */
/* БЛОК КАРТИНКИ */
/* ========================= */

.image {

  width: 50%;

  height: 100%;

  position: relative;

  background-size: contain;

  background-position: top center;

  background-repeat: no-repeat;

  cursor: pointer;

}

/* ========================= */
/* ТЕКСТ НАД КАРТИНКОЙ */
/* ========================= */

.hover-text {

  position: absolute;

  top: 10px;

  left: 20px;

  font-size: 26px;

  font-weight: bold;

  color: black;

  background: rgba(255,255,255,0.8);

  padding: 6px 12px;

  white-space: nowrap;

  overflow: hidden;

  width: 0;

  transition: width 0.4s ease;

}

/* ========================= */
/* HOVER ЭФФЕКТ */
/* ========================= */

.image:hover .hover-text {

  width: 100%;

}

/* ========================= */
/* ЛЕВАЯ */
/* ========================= */

.left {

  background-image: url("https://matmodelator.github.io/Mvp/styles/dating.jpg");

}

/* ========================= */
/* ПРАВАЯ */
/* ========================= */

.right {

  background-image: url("https://matmodelator.github.io/Mvp/styles/tennis.jpg");

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 768px) {

  .images {

    flex-direction: column;

    height: 70vh;

  }

  .image {

    width: 100%;

    height: 50%;

  }

}
      
</style>

      

</head>

<body>

<div class="header">

M.V.P
<div class="mvp-lines">

    <span>Most</span>
    <span>Valuable</span>
    <span>Project</span>

  </div>
</div>

<div class="images">

<div class="image left">
  <div class="hover-text">
    Most Valuable Partner
  </div>
</div>

<div class="image right">
  <div class="hover-text">
    Most Valuable Player
  </div>
</div>    

</div>





<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

    side hover | v1.2.0

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

      
</body>
</html>
