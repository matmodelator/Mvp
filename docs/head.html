<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>MVP</title>

<!-- СТИЛЬ КОНСОЛИ -->

  <link rel="stylesheet"
        href="styles/console.css" />

      
<style>

/* ========================= */
/* СБРОС */
/* ========================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ========================= */
/* BODY */
/* ========================= */

body {

  font-family: Arial, sans-serif;

  height: 100vh;

  display: flex;

  flex-direction: column;

}

/* ========================= */
/* ТИТР */
/* ========================= */

.header {

  width: 100%;

  text-align: center;

  padding: 20px;

  font-size: 36px;

  font-weight: bold;

  background: white;

  z-index: 10;

}

/* ========================= */
/* КОНТЕЙНЕР КАРТИНОК */
/* ========================= */

.images {

  height: 70vh;

  display: flex;

  width: 100%;

  align-items: flex-start;

}

/* ========================= */
/* ЛЕВАЯ / ПРАВАЯ */
/* ========================= */

.image {

  width: 50%;

  height: 100%;

  background-size: contain;

  background-position: top center;

  background-repeat: no-repeat;

}

/* ========================= */
/* ЛЕВАЯ КАРТИНКА */
/* ========================= */

.left {

  background-image: url("https://matmodelator.github.io/Mvp/styles/dating.jpg");

}

/* ========================= */
/* ПРАВАЯ КАРТИНКА */
/* ========================= */

.right {

  background-image: url("https://matmodelator.github.io/Mvp/styles/tennis.jpg");

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 768px) {

  .images {

    flex-direction: column;

    height: 70vh;

  }

  .image {

    width: 100%;

    height: 50%;

  }

}
</style>

</head>

<body>

<div class="header">

MVP

</div>

<div class="images">

<div class="image left"></div>

<div class="image right"></div>

</div>



<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

    рабочий заставка | v1.0.0

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

      
</body>
</html>
