
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />
  <title>Upload Photo</title>

<!-- СТИЛЬ КОНСОЛИ -->

  <link rel="stylesheet"
        href="styles/console.css" />
  
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 16px;
      text-align: center;
    }

    .container {
      max-width: 760px;
      margin: 24px auto;
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .label {
      font-weight: 700;
      min-width: 120px;
    }

    .value {
      color: #374151;
      word-break: break-word;
    }

    .preview-wrap {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      background: #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      margin: 18px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #d1d5db;
      display: none;
    }

    .empty {
      color: #6b7280;
      padding: 16px;
      text-align: center;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #6b7280;
    }

    button.secondary:hover {
      background: #4b5563;
    }

    button.danger {
      background: #dc2626;
    }

    button.danger:hover {
      background: #b91c1c;
    }

    input[type="file"],
    select {
      width: 100%;
      max-width: 360px;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: white;
    }

    .status {
      margin-top: 18px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      white-space: pre-line;
      color: #111827;
      min-height: 80px;
    }

    .small {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }

    .hidden {
      display: none !important;
    }

    .ok {
      color: #065f46;
    }

    .warn {
      color: #92400e;
    }

    .err {
      color: #991b1b;
    }
  </style>
</head>
<body>
  <header>
    <h1>Upload photo to gallery</h1>
  </header>

  <div class="container">

    <div class="row">
      <div class="label">Slot</div>
      <div class="value">
        <select id="slotSelect"></select>
      </div>
    </div>

    <div class="row">
      <div class="label">Section</div>
      <div class="value" id="sectionLabel">—</div>
    </div>

    <div class="row">
      <div class="label">Source</div>
      <div class="value" id="sourceLabel">—</div>
    </div>

    <div class="row">
      <div class="label">Manual file</div>
      <div class="value">
        <input type="file"
               id="fileInput"
               accept="image/*" />
        <div class="small">
          Если в localStorage нет результата re-photo — можно выбрать файл вручную
        </div>
      </div>
    </div>

    <div class="preview-wrap">
      <img id="preview" alt="preview" />
      <div id="emptyPreview" class="empty">
        Нет картинки для загрузки
      </div>
    </div>

    <div class="buttons">
  <button type="button" id="readBtn">
    Read from re-photo
  </button>

  <button type="button" id="uploadBtn">
    Upload
  </button>

  <button type="button"
          class="secondary"
          id="loadSlotBtn">
    Load current slot
  </button>

  <button type="button"
          class="secondary"
          id="backBtn">
    Back
  </button>

  <button type="button"
          class="danger"
          id="clearBtn">
    Clear re-photo buffer
</button>
      
    <button type="button"
        class="secondary"
        id="backRePhotoBtn">
  Back to re-photo
</button>

<button type="button"
        class="secondary"
        id="forwardGalleryBtn">
  Go to gallery
</button>

<button type="button"
        class="secondary"
        id="upMainBtn">
  Go to main
</button>
  
</div>

    <div id="status" class="status">
      Проверяем сессию...
    </div>

  </div>

 <script type="module">
  import { supabase } from './supabase-config.js'

  /*
  ========================================
  SETTINGS
  ========================================
  */

  const BUCKET_NAME = 'photos'
  const REPHOTO_STORAGE_KEY = 'rephoto_result'

  /*
  ========================================
  STATE
  ========================================
  */

  let currentUser = null
  let currentImageBlob = null
  let currentImageUrl = ''
  let currentSource = 'none'

  /*
  ========================================
  DOM
  ========================================
  */

  const preview =
    document.getElementById('preview')

  const emptyPreview =
    document.getElementById('emptyPreview')

  const statusBox =
    document.getElementById('status')

  const fileInput =
    document.getElementById('fileInput')

  const slotSelect =
    document.getElementById('slotSelect')

  const sectionLabel =
    document.getElementById('sectionLabel')

  const sourceLabel =
    document.getElementById('sourceLabel')

  const readBtn =
    document.getElementById('readBtn')

  const uploadBtn =
    document.getElementById('uploadBtn')

  const loadSlotBtn =
    document.getElementById('loadSlotBtn')

  const backBtn =
    document.getElementById('backBtn')

  const clearBtn =
    document.getElementById('clearBtn')

const backRePhotoBtn =
document.getElementById('backRePhotoBtn')

const forwardGalleryBtn =
document.getElementById('forwardGalleryBtn')

const upMainBtn =
document.getElementById('upMainBtn')

/*
================================
NAVIGATION
================================
*/

function goToRePhoto() {

  const slot =
    slotSelect.value || '0'

  window.location.href =
    're-photo.html?slot=' + slot

}

function goToGallery() {

  window.location.href =
    'gallery.html'

}

function goToMain() {

  window.location.href =
    'main.html'

}
   
  /*
  ========================================
  UTILS
  ========================================
  */

  function setStatus(text, cls = '') {
    statusBox.className = 'status'
    if (cls) statusBox.classList.add(cls)
    statusBox.textContent = text
  }

  function getSectionBySlot(slot) {
    if (slot === 0) return 'avatar'
    if (slot >= 1 && slot <= 3) return 'base'
    if (slot >= 4 && slot <= 6) return 'advanced'
    if (slot >= 7 && slot <= 9) return 'private'
    if (slot === 10) return 'bonus'
    return 'unknown'
  }

  function refreshSectionLabel() {
    const slot = Number(slotSelect.value)
    sectionLabel.textContent = getSectionBySlot(slot)
  }

  function setSourceLabel() {
    sourceLabel.textContent = currentSource
  }

  function showPreview(url) {
    currentImageUrl = url || ''

    if (url) {
      preview.src = url
      preview.style.display = 'block'
      emptyPreview.style.display = 'none'
    } else {
      preview.removeAttribute('src')
      preview.style.display = 'none'
      emptyPreview.style.display = 'block'
    }
  }

  function parseSlotFromUrl() {
    const params = new URLSearchParams(window.location.search)
    const slot = Number(params.get('slot'))

    if (Number.isInteger(slot) && slot >= 0 && slot <= 10) {
      return slot
    }

    return 0
  }

  function buildSlotOptions() {
    slotSelect.innerHTML = ''

    for (let i = 0; i <= 10; i++) {
      const option = document.createElement('option')
      option.value = String(i)
      option.textContent = `${i} — ${getSectionBySlot(i)}`
      slotSelect.appendChild(option)
    }

    slotSelect.value = String(parseSlotFromUrl())
    refreshSectionLabel()
  }

  async function ensureSession() {
    const {
      data: { user },
      error
    } = await supabase.auth.getUser()

    if (error || !user) {
      currentUser = null
      setStatus(
        'No active session.\nPlease sign in to MVP first.',
        'err'
      )
      console.log('ensureSession error:', error)
      return false
    }

    currentUser = user

    setStatus(
      `User: ${user.email || 'no email'}\n` +
      `ID: ${user.id}\n` +
      `Slot: ${slotSelect.value} (${getSectionBySlot(Number(slotSelect.value))})`
    )

    return true
  }

  async function dataUrlToBlob(dataUrl) {
    const response = await fetch(dataUrl)
    return await response.blob()
  }

  async function urlToBlob(url) {
    const response = await fetch(url)
    if (!response.ok) {
      throw new Error(`cannot fetch image: ${response.status}`)
    }
    return await response.blob()
  }

  function getFileExtFromBlob(blob) {
    const type = blob.type || ''

    if (type.includes('png')) return 'png'
    if (type.includes('webp')) return 'webp'
    if (type.includes('jpeg')) return 'jpg'
    if (type.includes('jpg')) return 'jpg'
    return 'jpg'
  }

  function buildStoragePath(userId, slot, blob) {
    const ext = getFileExtFromBlob(blob)
    return `${userId}/${slot}.${ext}`
  }

  /*
  ========================================
  RE-PHOTO BUFFER
  ========================================
  */

  async function readFromRePhoto() {
    const raw = localStorage.getItem(REPHOTO_STORAGE_KEY)

    if (!raw) {
      currentImageBlob = null
      currentSource = 'none'
      setSourceLabel()
      showPreview('')
      setStatus(
        `No localStorage key "${REPHOTO_STORAGE_KEY}".\n` +
        `First save the result from re-photo into this key\n` +
        `or choose a file manually.`,
        'warn'
      )
      return
    }

    try {
      let dataUrl = ''

      if (raw.startsWith('data:image/')) {
        dataUrl = raw
      } else {
        const parsed = JSON.parse(raw)
        dataUrl = parsed.dataUrl || ''
      }

      if (!dataUrl.startsWith('data:image/')) {
        throw new Error('invalid image data')
      }

      const blob = await dataUrlToBlob(dataUrl)

      currentImageBlob = blob
      currentSource = `re-photo localStorage: ${REPHOTO_STORAGE_KEY}`
      setSourceLabel()
      showPreview(dataUrl)

      setStatus(
        `Re-photo result loaded.\n` +
        `Size: ${Math.round(blob.size / 1024)} KB\n` +
        `Type: ${blob.type || 'unknown'}`,
        'ok'
      )
    } catch (error) {
      currentImageBlob = null
      currentSource = 'none'
      setSourceLabel()
      showPreview('')

      setStatus(
        'Failed to read re-photo buffer.\n' +
        String(error.message || error),
        'err'
      )
    }
  }

  function clearRePhotoBuffer() {
    localStorage.removeItem(REPHOTO_STORAGE_KEY)

    if (currentSource.startsWith('re-photo')) {
      currentImageBlob = null
      currentSource = 'none'
      setSourceLabel()
      showPreview('')
    }

    setStatus(
      `Key "${REPHOTO_STORAGE_KEY}" cleared.`,
      'ok'
    )
  }

  /*
  ========================================
  MANUAL FILE
  ========================================
  */

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files?.[0]

    if (!file) return

    if (!file.type.startsWith('image/')) {
      setStatus(
        'Only image/* files are allowed.',
        'err'
      )
      return
    }

    currentImageBlob = file
    currentSource = `manual file: ${file.name}`
    setSourceLabel()

    const objectUrl = URL.createObjectURL(file)
    showPreview(objectUrl)

    setStatus(
      `Manual file selected.\n` +
      `Name: ${file.name}\n` +
      `Size: ${Math.round(file.size / 1024)} KB\n` +
      `Type: ${file.type}`,
      'ok'
    )
  })

  /*
  ========================================
  LOAD CURRENT SLOT PHOTO
  ========================================
  */

  async function loadCurrentSlotPhoto() {
    const ok = await ensureSession()
    if (!ok) return

    const slot = Number(slotSelect.value)

    setStatus(
      `Reading current slot ${slot}...`
    )

    const { data, error } =
      await supabase
        .from('gallery')
        .select('photo_url')
        .eq('user_id', currentUser.id)
        .eq('photo_number', slot)
        .maybeSingle()

    if (error) {
      setStatus(
        'Gallery read error:\n' + error.message,
        'err'
      )
      return
    }

    if (!data || !data.photo_url) {
      setStatus(
        `Slot ${slot} is empty.`,
        'warn'
      )
      return
    }

    try {
      const blob = await urlToBlob(data.photo_url)

      currentImageBlob = blob
      currentSource = `gallery slot ${slot}`
      setSourceLabel()
      showPreview(data.photo_url)

      setStatus(
        `Current slot photo loaded.\n` +
        `Slot: ${slot}\n` +
        `Type: ${blob.type || 'unknown'}\n` +
        `URL: ${data.photo_url}`,
        'ok'
      )
    } catch (error) {
      currentImageBlob = null
      currentSource = 'none'
      setSourceLabel()

      setStatus(
        'Failed to fetch current slot image.\n' +
        String(error.message || error),
        'err'
      )
    }
  }

  /*
  ========================================
  UPLOAD
  ========================================
  */

  async function uploadPhoto() {
    const ok = await ensureSession()
    if (!ok) return

    const slot = Number(slotSelect.value)

    if (!Number.isInteger(slot) || slot < 0 || slot > 10) {
      setStatus(
        'Invalid slot.',
        'err'
      )
      return
    }

    if (!currentImageBlob) {
      setStatus(
        'No image to upload.\n' +
        'Click "Read from re-photo"\n' +
        'or choose a file manually.',
        'warn'
      )
      return
    }

    if (currentImageBlob.size > 15 * 1024 * 1024) {
      setStatus(
        'File is too large. Maximum is 15MB.',
        'err'
      )
      return
    }

    setStatus(
      `Upload slot ${slot}...\n` +
      `Section: ${getSectionBySlot(slot)}`
    )

    const path =
      buildStoragePath(
        currentUser.id,
        slot,
        currentImageBlob
      )

    const { error: storageError } =
      await supabase
        .storage
        .from(BUCKET_NAME)
        .upload(
          path,
          currentImageBlob,
          { upsert: true }
        )

    if (storageError) {
      setStatus(
        'Storage upload error:\n' + storageError.message,
        'err'
      )
      return
    }

    const { data: publicData } =
      supabase
        .storage
        .from(BUCKET_NAME)
        .getPublicUrl(path)

    const photoUrl = publicData?.publicUrl || null

    if (!photoUrl) {
      setStatus(
        'Failed to get public URL.',
        'err'
      )
      return
    }

    const { error: dbError } =
      await supabase
        .from('gallery')
        .upsert(
          {
            user_id: currentUser.id,
            photo_number: slot,
            photo_url: photoUrl
          },
          {
            onConflict: 'user_id,photo_number'
          }
        )

    if (dbError) {
      setStatus(
        'Gallery write error:\n' + dbError.message,
        'err'
      )
      return
    }

    showPreview(photoUrl)
    currentSource = `uploaded to gallery slot ${slot}`
    setSourceLabel()

    setStatus(
      `Uploaded successfully.\n` +
      `User: ${currentUser.email || 'no email'}\n` +
      `Slot: ${slot}\n` +
      `Section: ${getSectionBySlot(slot)}\n` +
      `Path: ${path}`,
      'ok'
    )
  }

  /*
  ========================================
  NAV
  ========================================
  */

  function goBack() {
    if (window.history.length > 1) {
      window.history.back()
      return
    }

    window.location.href = 'gallery.html'
  }

  slotSelect.addEventListener('change', () => {
    refreshSectionLabel()

    const slot = Number(slotSelect.value)
    const url = new URL(window.location.href)
    url.searchParams.set('slot', String(slot))
    window.history.replaceState({}, '', url)
  })

  /*
  ========================================
  BUTTONS
  ========================================
  */

  readBtn.addEventListener('click', readFromRePhoto)
  uploadBtn.addEventListener('click', uploadPhoto)
  loadSlotBtn.addEventListener('click', loadCurrentSlotPhoto)
  backBtn.addEventListener('click', goBack)
  clearBtn.addEventListener('click', clearRePhotoBuffer)

backRePhotoBtn
  .addEventListener('click', goToRePhoto)

forwardGalleryBtn
  .addEventListener('click', goToGallery)

upMainBtn
  .addEventListener('click', goToMain)
  /*
  ========================================
  START
  ========================================
  */

  buildSlotOptions()
  setSourceLabel()
  ensureSession()
  readFromRePhoto()
</script>

<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

redirect| v1.0.3

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

  </body>
</html>
