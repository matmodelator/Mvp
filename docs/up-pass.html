<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />
  <title>Новый пароль</title>

 <!-- СТИЛЬ КОНСОЛИ -->

  <link rel="stylesheet"
        href="styles/console.css" />
  
  <style>

    /* ========================================
       БАЗОВАЯ РАЗМЕТКА
    ======================================== */

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 24px;
    }

    p {
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ========================================
       ПОЛЯ ВВОДА
    ======================================== */

    input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }

    .password-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    .eye-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: none;
      cursor: pointer;
      font-size: 16px;
    }

    /* Убирает встроенный глаз браузера */

    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear {
      display: none;
    }

    input[type="password"]::-webkit-credentials-auto-fill-button {
      display: none !important;
    }

    input[type="password"]::-webkit-textfield-decoration-container {
      display: none !important;
    }

    /* ========================================
       КНОПКИ
    ======================================== */

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
      margin-top: 6px;
    }

    button:hover {
      background: #1d4ed8;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      min-height: 22px;
      white-space: pre-line;
    }

    .success {
      color: green;
    }

    .error {
      color: #b00020;
    }

  </style>
</head>

<body>

  <div class="box">

    <h1>Смена пароля</h1>

    <p>
      Введите код из письма и новый пароль.
    </p>

    <form id="passwordForm">

      <!-- EMAIL -->

      <input
        id="email"
        type="email"
        placeholder="Email"
        required
      />

      <!-- КОД -->

      <input
        id="code"
        type="text"
        inputmode="numeric"
        maxlength="8"
        placeholder="Код из письма"
        required
      />

      <!-- НОВЫЙ ПАРОЛЬ -->

      <div class="password-wrapper">

        <input
          id="password"
          type="password"
          placeholder="Новый пароль"
          required
        />

        <button
          type="button"
          class="eye-btn"
          onclick="togglePassword('password', this)"
        >
          👁
        </button>

      </div>

      <!-- ПОВТОР ПАРОЛЯ -->

      <div class="password-wrapper">

        <input
          id="password2"
          type="password"
          placeholder="Повторите новый пароль"
          required
        />

        <button
          type="button"
          class="eye-btn"
          onclick="togglePassword('password2', this)"
        >
          👁
        </button>

      </div>

      <button type="submit">
        Сохранить новый пароль
      </button>

    </form>

    <div id="status"></div>

    <button
      id="goSignBtn"
      onclick="goToSign()"
      style="display:none;"
    >
      Переход к обновлению пароля
    </button>

  </div>

<script type="module">

  import { supabase }
  from './supabase-config.js'

  const form = document.getElementById('passwordForm')
  const emailInput = document.getElementById('email')
  const codeInput = document.getElementById('code')
  const passwordInput = document.getElementById('password')
  const password2Input = document.getElementById('password2')
  const statusEl = document.getElementById('status')
  const goSignBtn = document.getElementById('goSignBtn')

  function togglePassword(id, btn) {

    const field =
      document.getElementById(id)

    if (field.type === 'password') {

      field.type =
        'text'

      btn.textContent =
        '🙈'

    }
    else {

      field.type =
        'password'

      btn.textContent =
        '👁'

    }

  }

  window.togglePassword =
    togglePassword 

  function goToSign() {

    window.location.href =
      'sign.html'

  }

  window.goToSign =
    goToSign

  const params = new URLSearchParams(window.location.search)
  const emailFromUrl = params.get('email')

  if (emailFromUrl) {
    emailInput.value = emailFromUrl
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault()

    statusEl.textContent = ''
    statusEl.className = ''
    goSignBtn.style.display = 'none'

    const email = emailInput.value.trim()
    const token = codeInput.value.trim()
    const password = passwordInput.value.trim()
    const password2 = password2Input.value.trim()

    if (!email) {
      statusEl.textContent = 'Введите email.'
      statusEl.className = 'error'
      return
    }

    if (!/^\d{8}$/.test(token)) {
      statusEl.textContent = 'Код должен состоять из 8 цифр.'
      statusEl.className = 'error'
      return
    }

    if (password.length < 6) {
      statusEl.textContent = 'Пароль должен быть не короче 6 символов.'
      statusEl.className = 'error'
      return
    }

    if (password !== password2) {
      statusEl.textContent = 'Пароли не совпадают.'
      statusEl.className = 'error'
      return
    }

    statusEl.textContent = 'Проверяем код...'

    const { error: verifyError } = await supabase.auth.verifyOtp({
      email: email,
      token: token,
      type: 'recovery'
    })

    if (verifyError) {
      statusEl.textContent = 'Ошибка кода: ' + verifyError.message
      statusEl.className = 'error'
      return
    }

    statusEl.textContent = 'Меняем пароль...'

    const { error: updateError } = await supabase.auth.updateUser({
      password: password
    })

    if (updateError) {
      statusEl.textContent = 'Ошибка смены пароля: ' + updateError.message
      statusEl.className = 'error'
      return
    }

    statusEl.textContent =
      'Пароль успешно изменен.\nТеперь нажмите кнопку ниже.'

    statusEl.className = 'success'

    goSignBtn.style.display = 'block'
  })

</script>


<!-- ========================================
     SERVICE CONSOLE
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    eyes from sign & no timer | v1.2.1

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>


<script>

(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

</body>
</html>
