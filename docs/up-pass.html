<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Новый пароль</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 24px;
    }

    p {
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      min-height: 22px;
    }

    .success {
      color: green;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Смена пароля</h1>

    <p>
      Введите новый пароль.
    </p>

    <form id="passwordForm">
      <input
        id="password"
        type="password"
        placeholder="Новый пароль"
        required
      />

      <input
        id="password2"
        type="password"
        placeholder="Повторите новый пароль"
        required
      />

      <button type="submit">Сохранить новый пароль</button>
    </form>

    <div id="status"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'YOUR_SUPABASE_URL'
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const form = document.getElementById('passwordForm')
    const passwordInput = document.getElementById('password')
    const password2Input = document.getElementById('password2')
    const statusEl = document.getElementById('status')

    form.addEventListener('submit', async function (e) {
      e.preventDefault()

      statusEl.textContent = ''
      statusEl.className = ''

      const password = passwordInput.value.trim()
      const password2 = password2Input.value.trim()

      if (password.length < 6) {
        statusEl.textContent = 'Пароль должен быть не короче 6 символов.'
        statusEl.className = 'error'
        return
      }

      if (password !== password2) {
        statusEl.textContent = 'Пароли не совпадают.'
        statusEl.className = 'error'
        return
      }

      const { error } = await supabase.auth.updateUser({
        password: password
      })

      if (error) {
        statusEl.textContent = 'Ошибка: ' + error.message
        statusEl.className = 'error'
        return
      }

      statusEl.textContent = 'Пароль успешно изменен. Теперь можно войти.'
      statusEl.className = 'success'

      setTimeout(function () {
        window.location.href = 'index.html'
      }, 1500)
    })
  </script>
</body>
</html>
