<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Chat</title>

  <!-- СТИЛЬ КОНСОЛИ -->
  <link rel="stylesheet"
        href="styles/console.css" />

  <link rel="stylesheet" href="styles/chat.css">
</head>
<body>

  <button onclick="goMain()">
    Назад на главную
  </button>

  <header>
    <h1>Общий чат</h1>
  </header>

  <div class="chat-box">
    <p id="status">Проверяем сессию...</p>

    <div id="messages" class="messages"></div>

    <!-- Ограничение длины сообщения -->
    <form id="chatForm">

      <input
        id="messageInput"
        type="text"
        placeholder="Напишите сообщение..."
        maxlength="150"
        required
      >

      <button type="submit">
        Отправить
      </button>

    </form>
  </div>

<!--
===========================================================
SCRIPT: PUBLIC CHAT REALTIME
===========================================================

1. Проверяет, вошел ли пользователь
2. Загружает сообщения из таблицы public_chat_messages
3. Позволяет отправлять новые сообщения
4. Слушает новые сообщения в реальном времени (Realtime)
5. Показывает сообщения на странице
===========================================================
-->

<script type="module">

/*
===========================================================
ПОДКЛЮЧЕНИЕ SUPABASE
===========================================================
*/

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://fnodbpiwkkrdgqvmyanq.supabase.co',
  'sb_publishable_9GjllWmCfI2E7okWGOG9Wg_qCh8Gv6T'
)

/*
===========================================================
ПОЛУЧАЕМ ЭЛЕМЕНТЫ СТРАНИЦЫ
===========================================================
*/

const status =
  document.getElementById('status')

const messages =
  document.getElementById('messages')

const form =
  document.getElementById('chatForm')

const input =
  document.getElementById('messageInput')

input.addEventListener(
  'keydown',
  (event) => {

    if (event.key === 'Enter') {
      event.preventDefault()
      form.requestSubmit()
    }

  }
)

let currentUser = null
let currentMaskId = null
let currentColorId = null

/*
===========================================================
ПРОВЕРКА ПОЛЬЗОВАТЕЛЯ
===========================================================
*/

async function loadUser() {

  const { data, error } =
    await supabase.auth.getUser()

  if (error || !data.user) {

    window.location.href =
      'index.html'

    return
  }

  currentUser = data.user

  const { data: chatUser, error: chatUserError } =
    await supabase
      .from('public_chat_users')
      .select('mask_id, color_id')
      .eq('user_id', currentUser.id)
      .single()

  if (chatUserError) {
    console.log('Ошибка загрузки public_chat_users:', chatUserError.message)
    status.textContent =
      'Ошибка загрузки данных чата: ' + chatUserError.message
    return
  }

  if (!chatUser) {
    status.textContent =
      'Для пользователя не найдены mask_id и color_id'
    return
  }

  currentMaskId =
    chatUser.mask_id || null

  currentColorId =
    chatUser.color_id || null

  if (!currentMaskId || !currentColorId) {
    status.textContent =
      'У пользователя не заданы mask_id или color_id'
    return
  }

  status.textContent = ''
}

/*
===========================================================
ЗАГРУЗКА СООБЩЕНИЙ ИЗ БАЗЫ
===========================================================
*/

async function loadMessages() {

  const { data, error } =
    await supabase
      .from('public_chat_messages')
      .select(`
        *,
        masks!public_chat_messages_mask_id_fkey (
          name,
          icon
        ),
        colors!public_chat_messages_color_id_fkey (
          hex
        )
      `)
      .order('created_at')

  if (error) {

    console.log('Ошибка загрузки сообщений:', error.message)
    status.textContent =
      'Ошибка загрузки сообщений: ' + error.message
    return

  }

  messages.innerHTML = ''

  data.forEach(renderMessage)
}

/*
===========================================================
ОТОБРАЖЕНИЕ СООБЩЕНИЯ
===========================================================
*/

function renderMessage(row) {

  const time =
    new Date(row.created_at)
      .toLocaleTimeString()

  const div =
    document.createElement('div')

  const maskRow =
    Array.isArray(row.masks)
      ? row.masks[0]
      : row.masks

  const colorRow =
    Array.isArray(row.colors)
      ? row.colors[0]
      : row.colors

  const maskText =
    ((maskRow?.icon || '') + ' ' + (maskRow?.name || '')).trim()
    || String(row.mask_id || '')

  div.textContent =
    maskText +
    ' • ' +
    time +
    ': ' +
    row.message

  div.style.color =
    colorRow?.hex || '#111111'

  messages.appendChild(div)

  messages.scrollTop =
    messages.scrollHeight
}

/*
===========================================================
ОТПРАВКА СООБЩЕНИЯ
===========================================================
*/

async function sendMessage(event) {

  event.preventDefault()

  const text =
    input.value.trim()

  if (!text) return

  if (!currentUser) {
    status.textContent =
      'Пользователь не загружен'
    return
  }

  if (!currentMaskId || !currentColorId) {
    status.textContent =
      'Не найдены mask_id или color_id'
    return
  }

  const { error } =
    await supabase
      .from('public_chat_messages')
      .insert({

        user_id:
          currentUser.id,

        user_email:
          currentUser.email,

        mask_id:
          currentMaskId,

        color_id:
          currentColorId,

        message:
          text

      })

  if (error) {
    console.log('Ошибка отправки:', error.message)
    status.textContent =
      'Ошибка отправки: ' + error.message
    return
  }

  input.value = ''
  status.textContent = ''
}

/*
===========================================================
REALTIME ПОДПИСКА
===========================================================
*/

function subscribeRealtime() {

  supabase
    .channel('public-chat')
    .on(
      'postgres_changes',
      {
        event: 'INSERT',
        schema: 'public',
        table: 'public_chat_messages'
      },
      async () => {
        await loadMessages()
      }
    )
    .subscribe()
}

/*
===========================================================
СОБЫТИЕ ОТПРАВКИ ФОРМЫ
===========================================================
*/

form.addEventListener(
  'submit',
  sendMessage
)

/*
===========================================================
ЗАПУСК ЧАТА
===========================================================
*/

await loadUser()
await loadMessages()
subscribeRealtime()

/*
Кнопка "Назад на главную"
*/

function goMain() {
  window.location.href = 'main.html'
}

window.goMain = goMain

</script>

<!-- ========================================
     SERVICE CONSOLE
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

   замена render  | v1.2.6

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
======================================== -->

<script>

(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

</body>
</html>
