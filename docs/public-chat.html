<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Chat</title>

  <!-- СТИЛЬ КОНСОЛИ -->
  <link rel="stylesheet"
        href="styles/console.css" />


  
  <link rel="stylesheet" href="styles/chat.css">
</head>
<body>

  <button onclick="goMain()">
  Назад на главную
</button>
  
  <header>
    <h1>Общий чат</h1>
  </header>

  <div class="chat-box">
    <p id="status">Проверяем сессию...</p>

    <div id="messages" class="messages"></div>
    
<!-- Ограничение длины сообщения -->

  <form id="chatForm">

    <input
      id="messageInput"
      type="text"
      placeholder="Напишите сообщение..."
      maxlength="150"
      required
    >

    <button type="submit">
      Отправить
    </button>

  </form>
   
  </div>



  
<!--
===========================================================
SCRIPT: PUBLIC CHAT REALTIME
===========================================================

1. Проверяет, вошел ли пользователь
2. Загружает сообщения из таблицы public_chat_messages
3. Позволяет отправлять новые сообщения
4. Слушает новые сообщения в реальном времени (Realtime)
5. Показывает сообщения на странице

Таблица:

public_chat_messages

Поля:

id
user_id
user_email
message
created_at

Требования:

- таблица создана
- RLS включен
- Realtime включен
- пользователь авторизован
===========================================================
-->

<script type="module">

/*
===========================================================
ПОДКЛЮЧЕНИЕ SUPABASE
===========================================================
*/

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

/*
Создаем соединение с проектом Supabase
*/

const supabase = createClient(
  'https://fnodbpiwkkrdgqvmyanq.supabase.co',
  'sb_publishable_9GjllWmCfI2E7okWGOG9Wg_qCh8Gv6T'
)

/*
===========================================================
ПОЛУЧАЕМ ЭЛЕМЕНТЫ СТРАНИЦЫ
===========================================================
*/

const messages =
  document.getElementById('messages')

const form =
  document.getElementById('chatForm')

const input =
  document.getElementById('messageInput')

  /*
Если пользователь нажимает Enter —
форма отправляется
*/

input.addEventListener(
  'keydown',
  (event) => {

    if (event.key === 'Enter') {

      form.requestSubmit()

    }

  }
)

let currentUser = null
let currentMask = ''
let currentInkColor = '#111111'

/*
===========================================================
ПРОВЕРКА ПОЛЬЗОВАТЕЛЯ
===========================================================

Если пользователь не вошел —
перенаправляем на страницу входа
*/

async function loadUser() {

  const { data, error } =
    await supabase.auth.getUser()

  if (error || !data.user) {

    window.location.href =
      'log.html'

    return
  }

  currentUser = data.user

  const { data: chatUser } =
    await supabase
      .from('public_chat_users')
      .select('mask, ink_color')
      .eq('user_id', currentUser.id)
      .single()

  if (chatUser) {
    currentMask =
      chatUser.mask || ''

    currentInkColor =
      chatUser.ink_color || '#111111'
  }

}

/*
===========================================================
ЗАГРУЗКА СООБЩЕНИЙ ИЗ БАЗЫ
===========================================================

Берем последние сообщения
и выводим их на экран
*/

async function loadMessages() {

  const { data, error } =
    await supabase
      .from('public_chat_messages')
      .select('*')
      .order('created_at')

  if (error) {

    console.log(error.message)
    return

  }

  messages.innerHTML = ''

  data.forEach(renderMessage)

}

/*
===========================================================
ОТОБРАЖЕНИЕ СООБЩЕНИЯ
===========================================================
*/

function renderMessage(row) {

  /*
  Получаем время сообщения
  */

  const time =
    new Date(row.created_at)
      .toLocaleTimeString()

  /*
  Создаем элемент сообщения
  */

  const div =
    document.createElement('div')

  /*
  Формируем текст сообщения
  */

  div.textContent =
    row.mask +
    ' • ' +
    time +
    ': ' +
    row.message

  div.style.color =
    row.ink_color || '#111111'

  /*
  Добавляем сообщение в чат
  */

  messages.appendChild(div)

  /*
  Автоскролл вниз
  */

  messages.scrollTop =
    messages.scrollHeight

}

/*
===========================================================
ОТПРАВКА СООБЩЕНИЯ
===========================================================
*/

async function sendMessage(event) {

  event.preventDefault()

  const text =
    input.value.trim()

  if (!text) return

  await supabase
    .from('public_chat_messages')
    .insert({

      user_id:
        currentUser.id,

      user_email:
        currentUser.email,

      mask:
        currentMask,

      ink_color:
        currentInkColor,

      message:
        text

    })

  input.value = ''

}

/*
===========================================================
REALTIME ПОДПИСКА
===========================================================

Слушаем новые сообщения
без обновления страницы
*/

function subscribeRealtime() {

  supabase
    .channel('public-chat')

    .on(
      'postgres_changes',
      {
        event: 'INSERT',
        schema: 'public',
        table: 'public_chat_messages'
      },

      (payload) => {

        renderMessage(
          payload.new
        )

      }

    )

    .subscribe()

}

/*
===========================================================
СОБЫТИЕ ОТПРАВКИ ФОРМЫ
===========================================================
*/

form.addEventListener(
  'submit',
  sendMessage
)

/*
===========================================================
ЗАПУСК ЧАТА
===========================================================
*/

await loadUser()

await loadMessages()

subscribeRealtime()

  /*
Кнопка "Назад на главную"
*/

function goMain() {
  window.location.href = 'main.html'
}

window.goMain = goMain

</script>





<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

  ✅ row.name → row.mask_name || row.mask || ''
✅ row.email → убрать
✅ в тег с сообщением добавить style="color: ${row.ink_color || '#111'}"
✅ кнопку Назад удалить
✅ кнопку Назад на главную оставить | v1.2.0

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>


  
</body>
</html>
