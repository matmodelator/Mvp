
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<!-- Адаптация под мобильные -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>re-photo</title>

<!-- СТИЛЬ КОНСОЛИ -->

  <link rel="stylesheet"
        href="styles/console.css" />
    
<style>
/* ================================
   БАЗА
================================ */

body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

h2, h3 {
  margin-top: 0;
}

/* ================================
   ВЕРХНЯЯ ПАНЕЛЬ
================================ */

.controls {
  margin-bottom: 24px;
}

.controls-row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px 18px;
  margin-bottom: 16px;
  align-items: end;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-size: 14px;
  color: #333;
}

.field input,
.field select {
  padding: 8px 10px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  min-width: 130px;
}

.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 12px;
}

button {
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

button:disabled {
  background: #94a3b8;
  cursor: not-allowed;
}

.status {
  margin-top: 14px;
  color: #b91c1c;
  min-height: 20px;
  white-space: pre-line;
}

/* ================================
   ДВЕ КОЛОНКИ
================================ */

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.panel {
  flex: 1 1 520px;
  background: #fafafa;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 16px;
}

.preview-box {
  min-height: 420px;
  background: #e5e7eb;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  position: relative;
}

.info {
  margin-top: 12px;
  font-size: 14px;
  color: #444;
  white-space: pre-line;
}

/* ================================
   CANVAS
================================ */

#cropCanvas {
  max-width: 100%;
  display: none;
  cursor: crosshair;
  background: #ddd;
}

#resultPreview {
  max-width: 100%;
  max-height: 700px;
  display: none;
}

/* ================================
   ПОДСКАЗКИ
================================ */

.note {
  margin-top: 8px;
  font-size: 13px;
  color: #555;
  white-space: pre-line;
}
</style>
</head>
<body>

<div class="container">

  <h2>Обработка фото</h2>

  <div class="controls">

    <div class="controls-row">

      <!-- Выбор файла -->
      <div class="field">
        <label for="photoInput">Файл</label>
        <input id="photoInput" type="file" accept="image/*">
      </div>

      <!-- Режим кропа -->
      <div class="field">
        <label for="cropMode">Режим кропа</label>
        <select id="cropMode">
          <option value="free">Свободный прямоугольник</option>
          <option value="square">Квадрат 1:1</option>
          <option value="landscape">Горизонтально 4:3</option>
          <option value="portrait">Вертикально 3:4</option>
        </select>
      </div>

      <!-- Максимальная ширина -->
      <div class="field">
        <label for="maxWidth">Max width</label>
        <input id="maxWidth" type="number" value="1200" min="50" step="50">
      </div>

      <!-- Максимальная высота -->
      <div class="field">
        <label for="maxHeight">Max height</label>
        <input id="maxHeight" type="number" value="1200" min="50" step="50">
      </div>

      <!-- Качество WebP -->
      <div class="field">
        <label for="quality">Quality</label>
        <input id="quality" type="number" value="0.75" min="0.1" max="1" step="0.05">
      </div>

    </div>

    <div class="buttons">
      <!-- Применить: вырезать выбранную область, уменьшить и перевести в webp -->
      <button id="applyBtn" type="button">Применить</button>

      <!-- Сбросить выделение -->
      <button id="resetCropBtn" type="button">Сбросить выделение</button>

      <!-- Скачать готовый результат -->
      <button id="downloadBtn" type="button" disabled>Скачать результат</button>
    </div>

    <div class="status" id="status"></div>

    <div class="note">
      Слева загрузи фото и выдели область мышью или пальцем.
      Потом нажми «Применить».
    </div>

  </div>

  <div class="row">

    <!-- ЛЕВАЯ ПАНЕЛЬ: исходник и область выделения -->
    <div class="panel">
      <h3>Исходник и выделение</h3>

      <div class="preview-box">
        <canvas id="cropCanvas"></canvas>
      </div>

      <div class="info" id="originalInfo"></div>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ: результат -->
    <div class="panel">
      <h3>Результат</h3>

      <div class="preview-box">
        <img id="resultPreview" alt="Результат">
      </div>

      <div class="info" id="resultInfo"></div>
    </div>

  </div>

</div>

<script>
/*
================================
ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
================================
*/

let originalFile = null;
let processedFile = null;
let processedObjectUrl = null;

let sourceImage = null;

/*
  Размер исходной картинки в пикселях
*/
let imageNaturalWidth = 0;
let imageNaturalHeight = 0;

/*
  Canvas может быть уменьшен визуально.
  Поэтому отдельно храним реальный размер canvas.
*/
let canvasDisplayWidth = 0;
let canvasDisplayHeight = 0;

/*
  Выделение пользователя на canvas
*/
let cropRect = null;

/*
  Флаг рисования прямоугольника
*/
let isSelecting = false;

/*
  Точка начала выделения
*/
let startX = 0;
let startY = 0;

/*
================================
DOM
================================
*/

const photoInput = document.getElementById("photoInput");
const cropMode = document.getElementById("cropMode");
const maxWidthInput = document.getElementById("maxWidth");
const maxHeightInput = document.getElementById("maxHeight");
const qualityInput = document.getElementById("quality");

const applyBtn = document.getElementById("applyBtn");
const resetCropBtn = document.getElementById("resetCropBtn");
const downloadBtn = document.getElementById("downloadBtn");

const cropCanvas = document.getElementById("cropCanvas");
const cropCtx = cropCanvas.getContext("2d");

const resultPreview = document.getElementById("resultPreview");
const originalInfo = document.getElementById("originalInfo");
const resultInfo = document.getElementById("resultInfo");
const statusBox = document.getElementById("status");

/*
================================
ВЫБОР ФАЙЛА
================================
*/

photoInput.addEventListener("change", async (event) => {
  clearStatus();
  resetResult();

  originalFile = event.target.files[0] || null;

  if (!originalFile) {
    clearCanvas();
    originalInfo.textContent = "";
    return;
  }

  if (!originalFile.type.startsWith("image/")) {
    setStatus("Нужен файл изображения.");
    return;
  }

  try {
    await loadOriginalIntoCanvas(originalFile);
    setDefaultCrop();
    drawCanvas();
    setStatus("Фото загружено. Выдели область и нажми «Применить».");
  } catch (error) {
    setStatus("Ошибка: " + error.message);
  }
});

/*
================================
КНОПКА ПРИМЕНИТЬ
================================
*/

applyBtn.addEventListener("click", async () => {
  if (!originalFile || !sourceImage) {
    setStatus("Сначала выбери фото.");
    return;
  }

  if (!cropRect || cropRect.width < 2 || cropRect.height < 2) {
    setStatus("Сначала выдели область на изображении.");
    return;
  }

  try {
    clearStatus();

    processedFile = await cropResizeAndConvertSelectionToWebp(originalFile, {
      cropRectCanvas: cropRect,
      canvasWidth: cropCanvas.width,
      canvasHeight: cropCanvas.height,
      imageWidth: imageNaturalWidth,
      imageHeight: imageNaturalHeight,
      maxWidth: Number(maxWidthInput.value) || 1200,
      maxHeight: Number(maxHeightInput.value) || 1200,
      quality: Number(qualityInput.value) || 0.75
    });

    await showResult(processedFile);
    setStatus("Применено.");
  } catch (error) {
    setStatus("Ошибка: " + error.message);
  }
});

/*
================================
КНОПКА СБРОСИТЬ ВЫДЕЛЕНИЕ
================================
*/

resetCropBtn.addEventListener("click", () => {
  if (!sourceImage) {
    setStatus("Сначала выбери фото.");
    return;
  }

  setDefaultCrop();
  drawCanvas();
  setStatus("Выделение сброшено.");
});

/*
================================
КНОПКА СКАЧАТЬ
================================
*/

downloadBtn.addEventListener("click", () => {
  if (!processedFile || !processedObjectUrl) {
    setStatus("Нет результата для скачивания.");
    return;
  }

  const a = document.createElement("a");
  a.href = processedObjectUrl;
  a.download = processedFile.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
});

/*
================================
ЗАГРУЗКА ИСХОДНИКА В CANVAS
================================
*/

async function loadOriginalIntoCanvas(file) {
  const dataUrl = await readFileAsDataURL(file);
  const img = await loadImage(dataUrl);

  sourceImage = img;
  imageNaturalWidth = img.width;
  imageNaturalHeight = img.height;

  /*
    Чтобы большое фото помещалось в панель,
    рисуем его на canvas в уменьшенном виде.
  */
  const maxCanvasWidth = 520;
  const maxCanvasHeight = 700;

  const scale = Math.min(
    maxCanvasWidth / img.width,
    maxCanvasHeight / img.height,
    1
  );

  canvasDisplayWidth = Math.round(img.width * scale);
  canvasDisplayHeight = Math.round(img.height * scale);

  cropCanvas.width = canvasDisplayWidth;
  cropCanvas.height = canvasDisplayHeight;
  cropCanvas.style.display = "block";

  originalInfo.textContent =
    "Имя: " + file.name + "\n" +
    "Тип: " + file.type + "\n" +
    "Размер: " + formatSize(file.size) + "\n" +
    "Разрешение: " + img.width + " × " + img.height + "\n" +
    "Canvas: " + cropCanvas.width + " × " + cropCanvas.height;
}

/*
================================
СТАНДАРТНОЕ ВЫДЕЛЕНИЕ
================================
*/

function setDefaultCrop() {
  if (!sourceImage) return;

  const w = Math.round(cropCanvas.width * 0.6);
  const h = getDefaultHeightByMode(w);

  cropRect = {
    x: Math.round((cropCanvas.width - w) / 2),
    y: Math.round((cropCanvas.height - h) / 2),
    width: w,
    height: h
  };

  normalizeCropRect();
}

/*
================================
ВЫЧИСЛИТЬ ВЫСОТУ ПО РЕЖИМУ
================================
*/

function getDefaultHeightByMode(width) {
  const mode = cropMode.value;

  if (mode === "square") {
    return width;
  }

  if (mode === "landscape") {
    return Math.round(width * 3 / 4);
  }

  if (mode === "portrait") {
    return Math.round(width * 4 / 3);
  }

  return Math.round(width * 0.7);
}

/*
================================
РИСОВАНИЕ CANVAS
================================
*/

function drawCanvas() {
  if (!sourceImage) return;

  cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);

  /*
    Рисуем исходник
  */
  cropCtx.drawImage(
    sourceImage,
    0, 0, imageNaturalWidth, imageNaturalHeight,
    0, 0, cropCanvas.width, cropCanvas.height
  );

  if (!cropRect) return;

  /*
    Затемнение вокруг выбранной области
  */
  cropCtx.save();
  cropCtx.fillStyle = "rgba(0, 0, 0, 0.45)";
  cropCtx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);

  cropCtx.clearRect(cropRect.x, cropRect.y, cropRect.width, cropRect.height);
  cropCtx.restore();

  /*
    Повторно рисуем изображение только внутри выбранной области,
    чтобы внутри прямоугольника картинка была яркой и чистой
  */
  cropCtx.save();
  cropCtx.beginPath();
  cropCtx.rect(cropRect.x, cropRect.y, cropRect.width, cropRect.height);
  cropCtx.clip();

  cropCtx.drawImage(
    sourceImage,
    0, 0, imageNaturalWidth, imageNaturalHeight,
    0, 0, cropCanvas.width, cropCanvas.height
  );
  cropCtx.restore();

  /*
    Рамка выделения
  */
  cropCtx.strokeStyle = "#2563eb";
  cropCtx.lineWidth = 2;
  cropCtx.strokeRect(cropRect.x, cropRect.y, cropRect.width, cropRect.height);

  /*
    Маленькие угловые маркеры для наглядности
  */
  drawCornerHandles();
}

/*
================================
УГЛОВЫЕ МАРКЕРЫ
================================
*/

function drawCornerHandles() {
  const s = 10;
  const points = [
    [cropRect.x, cropRect.y],
    [cropRect.x + cropRect.width, cropRect.y],
    [cropRect.x, cropRect.y + cropRect.height],
    [cropRect.x + cropRect.width, cropRect.y + cropRect.height]
  ];

  cropCtx.fillStyle = "#2563eb";

  points.forEach(([x, y]) => {
    cropCtx.fillRect(x - s / 2, y - s / 2, s, s);
  });
}

/*
================================
ПРЕОБРАЗОВАТЬ ВЫДЕЛЕНИЕ:
CROP + RESIZE + WEBP
================================
*/

async function cropResizeAndConvertSelectionToWebp(file, options = {}) {
  const {
    cropRectCanvas,
    canvasWidth,
    canvasHeight,
    imageWidth,
    imageHeight,
    maxWidth = 1200,
    maxHeight = 1200,
    quality = 0.8
  } = options;

  const dataUrl = await readFileAsDataURL(file);
  const image = await loadImage(dataUrl);

  /*
    Перевод координат из canvas в координаты реального исходника
  */
  const scaleX = imageWidth / canvasWidth;
  const scaleY = imageHeight / canvasHeight;

  let srcX = Math.round(cropRectCanvas.x * scaleX);
  let srcY = Math.round(cropRectCanvas.y * scaleY);
  let srcW = Math.round(cropRectCanvas.width * scaleX);
  let srcH = Math.round(cropRectCanvas.height * scaleY);

  /*
    Защита от выхода за границы
  */
  srcX = Math.max(0, Math.min(srcX, imageWidth - 1));
  srcY = Math.max(0, Math.min(srcY, imageHeight - 1));
  srcW = Math.max(1, Math.min(srcW, imageWidth - srcX));
  srcH = Math.max(1, Math.min(srcH, imageHeight - srcY));

  /*
    Resize уже вырезанной области
  */
  const scale = Math.min(
    maxWidth / srcW,
    maxHeight / srcH,
    1
  );

  const targetWidth = Math.round(srcW * scale);
  const targetHeight = Math.round(srcH * scale);

  const outCanvas = document.createElement("canvas");
  outCanvas.width = targetWidth;
  outCanvas.height = targetHeight;

  const outCtx = outCanvas.getContext("2d");

  if (!outCtx) {
    throw new Error("Canvas context недоступен.");
  }

  outCtx.drawImage(
    image,
    srcX, srcY, srcW, srcH,
    0, 0, targetWidth, targetHeight
  );

  const blob = await canvasToBlob(outCanvas, "image/webp", quality);

  const baseName = file.name.replace(/\.[^/.]+$/, "");

  return new File(
    [blob],
    baseName + ".webp",
    { type: "image/webp" }
  );
}

/*
================================
ПОКАЗАТЬ РЕЗУЛЬТАТ
================================
*/

async function showResult(file) {
  if (processedObjectUrl) {
    URL.revokeObjectURL(processedObjectUrl);
  }

  processedObjectUrl = URL.createObjectURL(file);

  resultPreview.src = processedObjectUrl;
  resultPreview.style.display = "block";

  const meta = await getImageMetaFromObjectUrl(processedObjectUrl);

  const savedPercent = originalFile && originalFile.size > 0
    ? (((originalFile.size - file.size) / originalFile.size) * 100).toFixed(1)
    : "0";

  resultInfo.textContent =
    "Имя: " + file.name + "\n" +
    "Тип: " + file.type + "\n" +
    "Размер: " + formatSize(file.size) + "\n" +
    "Разрешение: " + meta.width + " × " + meta.height + "\n" +
    "Экономия: " + savedPercent + "%";

  downloadBtn.disabled = false;
}

/*
================================
MOUSE EVENTS
================================
*/

cropCanvas.addEventListener("mousedown", onPointerDown);
cropCanvas.addEventListener("mousemove", onPointerMove);
window.addEventListener("mouseup", onPointerUp);

/*
================================
TOUCH EVENTS
================================
*/

cropCanvas.addEventListener("touchstart", onTouchStart, { passive: false });
cropCanvas.addEventListener("touchmove", onTouchMove, { passive: false });
window.addEventListener("touchend", onTouchEnd, { passive: false });

/*
================================
POINTER DOWN
================================
*/

function onPointerDown(event) {
  if (!sourceImage) return;

  const pos = getMousePosOnCanvas(event);

  isSelecting = true;
  startX = pos.x;
  startY = pos.y;

  cropRect = {
    x: pos.x,
    y: pos.y,
    width: 0,
    height: 0
  };

  drawCanvas();
}

/*
================================
POINTER MOVE
================================
*/

function onPointerMove(event) {
  if (!isSelecting || !sourceImage) return;

  const pos = getMousePosOnCanvas(event);
  updateCropByCurrentPoint(pos.x, pos.y);
  drawCanvas();
}

/*
================================
POINTER UP
================================
*/

function onPointerUp() {
  if (!isSelecting) return;

  isSelecting = false;
  normalizeCropRect();
  drawCanvas();
}

/*
================================
TOUCH START
================================
*/

function onTouchStart(event) {
  if (!sourceImage) return;
  event.preventDefault();

  const pos = getTouchPosOnCanvas(event);

  isSelecting = true;
  startX = pos.x;
  startY = pos.y;

  cropRect = {
    x: pos.x,
    y: pos.y,
    width: 0,
    height: 0
  };

  drawCanvas();
}

/*
================================
TOUCH MOVE
================================
*/

function onTouchMove(event) {
  if (!isSelecting || !sourceImage) return;
  event.preventDefault();

  const pos = getTouchPosOnCanvas(event);
  updateCropByCurrentPoint(pos.x, pos.y);
  drawCanvas();
}

/*
================================
TOUCH END
================================
*/

function onTouchEnd(event) {
  if (!isSelecting) return;
  event.preventDefault();

  isSelecting = false;
  normalizeCropRect();
  drawCanvas();
}

/*
================================
ОБНОВИТЬ ВЫДЕЛЕНИЕ ТЕКУЩЕЙ ТОЧКОЙ
================================
*/

function updateCropByCurrentPoint(currentX, currentY) {
  let x = startX;
  let y = startY;
  let width = currentX - startX;
  let height = currentY - startY;

  const mode = cropMode.value;

  /*
    Если режим не свободный —
    держим пропорцию
  */
  if (mode !== "free") {
    const ratio = getCropRatio(mode);

    const absWidth = Math.abs(width);
    const absHeight = Math.abs(height);

    /*
      Строим размер по dominant axis
    */
    if (absWidth / ratio > absHeight) {
      height = Math.sign(height || 1) * Math.round(absWidth / ratio);
    } else {
      width = Math.sign(width || 1) * Math.round(absHeight * ratio);
    }
  }

  cropRect = { x, y, width, height };
  normalizeCropRect();
  clampCropRectToCanvas();
}

/*
================================
НОРМАЛИЗАЦИЯ ПРЯМОУГОЛЬНИКА
Чтобы width/height были положительными
================================
*/

function normalizeCropRect() {
  if (!cropRect) return;

  if (cropRect.width < 0) {
    cropRect.x += cropRect.width;
    cropRect.width = Math.abs(cropRect.width);
  }

  if (cropRect.height < 0) {
    cropRect.y += cropRect.height;
    cropRect.height = Math.abs(cropRect.height);
  }
}

/*
================================
НЕ ВЫПУСКАТЬ ВЫДЕЛЕНИЕ ЗА ГРАНИЦЫ CANVAS
================================
*/

function clampCropRectToCanvas() {
  if (!cropRect) return;

  if (cropRect.x < 0) {
    cropRect.width += cropRect.x;
    cropRect.x = 0;
  }

  if (cropRect.y < 0) {
    cropRect.height += cropRect.y;
    cropRect.y = 0;
  }

  if (cropRect.x + cropRect.width > cropCanvas.width) {
    cropRect.width = cropCanvas.width - cropRect.x;
  }

  if (cropRect.y + cropRect.height > cropCanvas.height) {
    cropRect.height = cropCanvas.height - cropRect.y;
  }

  cropRect.width = Math.max(1, cropRect.width);
  cropRect.height = Math.max(1, cropRect.height);
}

/*
================================
ПРОПОРЦИИ РЕЖИМОВ КРОПА
================================
*/

function getCropRatio(mode) {
  if (mode === "square") return 1 / 1;
  if (mode === "landscape") return 4 / 3;
  if (mode === "portrait") return 3 / 4;
  return null;
}

/*
================================
ПОЛУЧИТЬ ПОЗИЦИЮ МЫШИ НА CANVAS
================================
*/

function getMousePosOnCanvas(event) {
  const rect = cropCanvas.getBoundingClientRect();

  const scaleX = cropCanvas.width / rect.width;
  const scaleY = cropCanvas.height / rect.height;

  return {
    x: Math.round((event.clientX - rect.left) * scaleX),
    y: Math.round((event.clientY - rect.top) * scaleY)
  };
}

/*
================================
ПОЛУЧИТЬ ПОЗИЦИЮ TOUCH НА CANVAS
================================
*/

function getTouchPosOnCanvas(event) {
  const touch = event.touches[0] || event.changedTouches[0];
  const rect = cropCanvas.getBoundingClientRect();

  const scaleX = cropCanvas.width / rect.width;
  const scaleY = cropCanvas.height / rect.height;

  return {
    x: Math.round((touch.clientX - rect.left) * scaleX),
    y: Math.round((touch.clientY - rect.top) * scaleY)
  };
}

/*
================================
HELPERS
================================
*/

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Ошибка чтения файла."));

    reader.readAsDataURL(file);
  });
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();

    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("Ошибка загрузки изображения."));

    img.src = src;
  });
}

function canvasToBlob(canvas, type, quality) {
  return new Promise((resolve, reject) => {
    canvas.toBlob((blob) => {
      if (!blob) {
        reject(new Error("Не удалось создать Blob."));
        return;
      }
      resolve(blob);
    }, type, quality);
  });
}

function getImageMetaFromObjectUrl(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();

    img.onload = () => resolve({
      width: img.width,
      height: img.height
    });

    img.onerror = () => reject(new Error("Не удалось прочитать размеры результата."));
    img.src = url;
  });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / 1024 / 1024).toFixed(2) + " MB";
}

function setStatus(text) {
  statusBox.textContent = text;
}

function clearStatus() {
  statusBox.textContent = "";
}

function clearCanvas() {
  cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
  cropCanvas.style.display = "none";
  sourceImage = null;
  cropRect = null;
}

function resetResult() {
  if (processedObjectUrl) {
    URL.revokeObjectURL(processedObjectUrl);
    processedObjectUrl = null;
  }

  processedFile = null;
  resultPreview.src = "";
  resultPreview.style.display = "none";
  resultInfo.textContent = "";
  downloadBtn.disabled = true;
}
</script>

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>
