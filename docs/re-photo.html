
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<!-- Адаптация под мобильные -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>re-photo</title>

<!-- СТИЛЬ КОНСОЛИ -->

  <link rel="stylesheet"
        href="styles/console.css" />
    

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

h2, h3 {
  margin-top: 0;
}

.controls {
  margin-bottom: 24px;
}

.controls-row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px 18px;
  margin-bottom: 16px;
  align-items: end;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-size: 14px;
  color: #333;
}

.field input,
.field select {
  padding: 8px 10px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  min-width: 130px;
}

.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 12px;
}

button {
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

button:disabled {
  background: #94a3b8;
  cursor: not-allowed;
}

.status {
  margin-top: 14px;
  color: #b91c1c;
  min-height: 20px;
  white-space: pre-line;
}

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.panel {
  flex: 1 1 520px;
  background: #fafafa;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 16px;
}

.preview-box {
  min-height: 420px;
  background: #e5e7eb;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  position: relative;
}

.info {
  margin-top: 12px;
  font-size: 14px;
  color: #444;
  white-space: pre-line;
}

#cropCanvas {
  max-width: 100%;
  display: none;
  background: #ddd;
  cursor: crosshair;
  touch-action: none;
}

#resultPreview {
  max-width: 100%;
  max-height: 700px;
  display: none;
}

.note {
  margin-top: 8px;
  font-size: 13px;
  color: #555;
  white-space: pre-line;
}
</style>
</head>
<body>

<div class="container">

  <h2>Обработка фото</h2>

  <div class="controls">

    <div class="controls-row">
      <div class="field">
        <label for="photoInput">Файл</label>
        <input id="photoInput" type="file" accept="image/*">
      </div>

      <div class="field">
        <label for="cropMode">Кроп</label>
        <select id="cropMode">
          <option value="free">Свободный прямоугольник</option>
          <option value="square">Квадрат 1:1</option>
          <option value="landscape">Горизонтально 4:3</option>
          <option value="portrait">Вертикально 3:4</option>
        </select>
      </div>

      <div class="field">
        <label for="maxWidth">Max width</label>
        <input id="maxWidth" type="number" value="1200" min="50" step="50">
      </div>

      <div class="field">
        <label for="maxHeight">Max height</label>
        <input id="maxHeight" type="number" value="1200" min="50" step="50">
      </div>

      <div class="field">
        <label for="quality">Quality</label>
        <input id="quality" type="number" value="0.75" min="0.1" max="1" step="0.05">
      </div>
    </div>

    <div class="buttons">
      <button id="applyBtn" type="button">Применить</button>
      <button id="cropBtn" type="button">Кроп</button>
      <button id="resizeBtn" type="button">Resize</button>
      <button id="downloadBtn" type="button" disabled>Скачать результат</button>
    </div>

    <div class="status" id="status"></div>

    <div class="note">
Кроп: выделяешь прямоугольник мышью или пальцем.
Resize: ткни в точку — это центр. Колесо мыши или pinch меняют масштаб.
Применить: берет текущий resize-view и сохраняет результат в webp.
    </div>

  </div>

  <div class="row">
    <div class="panel">
      <h3>Исходник / управление</h3>
      <div class="preview-box">
        <canvas id="cropCanvas"></canvas>
      </div>
      <div class="info" id="originalInfo"></div>
    </div>

    <div class="panel">
      <h3>Результат</h3>
      <div class="preview-box">
        <img id="resultPreview" alt="Результат">
      </div>
      <div class="info" id="resultInfo"></div>
    </div>
  </div>

</div>

<script>
/*
================================
ГЛОБАЛЬНОЕ
================================
*/

let originalFile = null;
let processedFile = null;
let processedObjectUrl = null;
let sourceImage = null;

let imageNaturalWidth = 0;
let imageNaturalHeight = 0;

let cropRect = null;
let isSelecting = false;
let startX = 0;
let startY = 0;

/*
  Режимы:
  crop   = прямоугольное выделение
  resize = центр + zoom
*/
let activeTool = "crop";

/*
  Resize-view
  centerX / centerY — центр в координатах ИСХОДНОГО изображения
  zoom > 1 означает приближение
*/
let resizeView = {
  centerX: 0,
  centerY: 0,
  zoom: 1
};

let pinchStartDistance = null;
let pinchStartZoom = 1;

/*
================================
DOM
================================
*/

const photoInput = document.getElementById("photoInput");
const cropMode = document.getElementById("cropMode");
const maxWidthInput = document.getElementById("maxWidth");
const maxHeightInput = document.getElementById("maxHeight");
const qualityInput = document.getElementById("quality");

const applyBtn = document.getElementById("applyBtn");
const cropBtn = document.getElementById("cropBtn");
const resizeBtn = document.getElementById("resizeBtn");
const downloadBtn = document.getElementById("downloadBtn");

const cropCanvas = document.getElementById("cropCanvas");
const cropCtx = cropCanvas.getContext("2d");

const resultPreview = document.getElementById("resultPreview");
const originalInfo = document.getElementById("originalInfo");
const resultInfo = document.getElementById("resultInfo");
const statusBox = document.getElementById("status");

/*
================================
ЗАГРУЗКА ФАЙЛА
================================
*/

photoInput.addEventListener("change", async (event) => {
  clearStatus();
  resetResult();

  originalFile = event.target.files[0] || null;

  if (!originalFile) {
    clearCanvas();
    originalInfo.textContent = "";
    return;
  }

  if (!originalFile.type.startsWith("image/")) {
    setStatus("Нужен файл изображения.");
    return;
  }

  try {
    await loadOriginalIntoCanvas(originalFile);

    setDefaultCrop();
    setDefaultResizeView();

    activeTool = "crop";
    drawCanvas();

    setStatus("Фото загружено.");
  } catch (error) {
    setStatus("Ошибка: " + error.message);
  }
});

/*
================================
КНОПКИ РЕЖИМОВ
================================
*/

cropBtn.addEventListener("click", async () => {
  if (!sourceImage) {
    setStatus("Сначала выбери фото.");
    return;
  }

  if (!cropRect || cropRect.width < 2 || cropRect.height < 2) {
    setStatus("Сначала выдели область.");
    return;
  }

  try {
    clearStatus();

    processedFile = await cropSelectionToFile(originalFile, {
      cropRectCanvas: cropRect,
      canvasWidth: cropCanvas.width,
      canvasHeight: cropCanvas.height,
      imageWidth: imageNaturalWidth,
      imageHeight: imageNaturalHeight,
      outputType: "image/jpeg",
      quality: Number(qualityInput.value) || 0.75,
      forceOutputExtension: "jpg"
    });

    await showResult(processedFile);
    activeTool = "crop";
    drawCanvas();
    setStatus("Кроп выполнен.");
  } catch (error) {
    setStatus("Ошибка: " + error.message);
  }
});

resizeBtn.addEventListener("click", async () => {
  if (!sourceImage) {
    setStatus("Сначала выбери фото.");
    return;
  }

  try {
    clearStatus();

    processedFile = await resizeViewToFile(originalFile, {
      view: resizeView,
      maxWidth: Number(maxWidthInput.value) || 1200,
      maxHeight: Number(maxHeightInput.value) || 1200,
      imageWidth: imageNaturalWidth,
      imageHeight: imageNaturalHeight,
      outputType: "image/jpeg",
      quality: Number(qualityInput.value) || 0.75,
      forceOutputExtension: "jpg"
    });

    await showResult(processedFile);
    activeTool = "resize";
    drawCanvas();
    setStatus("Resize выполнен.");
  } catch (error) {
    setStatus("Ошибка: " + error.message);
  }
});

applyBtn.addEventListener("click", async () => {
  if (!sourceImage) {
    setStatus("Сначала выбери фото.");
    return;
  }

  try {
    clearStatus();

    processedFile = await resizeViewToFile(originalFile, {
      view: resizeView,
      maxWidth: Number(maxWidthInput.value) || 1200,
      maxHeight: Number(maxHeightInput.value) || 1200,
      imageWidth: imageNaturalWidth,
      imageHeight: imageNaturalHeight,
      outputType: "image/webp",
      quality: Number(qualityInput.value) || 0.75,
      forceOutputExtension: "webp"
    });

    await showResult(processedFile);
    activeTool = "resize";
    drawCanvas();
    setStatus("Применено.");
  } catch (error) {
    setStatus("Ошибка: " + error.message);
  }
});

downloadBtn.addEventListener("click", () => {
  if (!processedFile || !processedObjectUrl) {
    setStatus("Нет результата для скачивания.");
    return;
  }

  const a = document.createElement("a");
  a.href = processedObjectUrl;
  a.download = processedFile.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
});

/*
================================
ЗАГРУЗКА В CANVAS
================================
*/

async function loadOriginalIntoCanvas(file) {
  const dataUrl = await readFileAsDataURL(file);
  const img = await loadImage(dataUrl);

  sourceImage = img;
  imageNaturalWidth = img.width;
  imageNaturalHeight = img.height;

  const maxCanvasWidth = 520;
  const maxCanvasHeight = 700;

  const scale = Math.min(
    maxCanvasWidth / img.width,
    maxCanvasHeight / img.height,
    1
  );

  cropCanvas.width = Math.round(img.width * scale);
  cropCanvas.height = Math.round(img.height * scale);
  cropCanvas.style.display = "block";

  originalInfo.textContent =
    "Имя: " + file.name + "\n" +
    "Тип: " + file.type + "\n" +
    "Размер: " + formatSize(file.size) + "\n" +
    "Разрешение: " + img.width + " × " + img.height + "\n" +
    "Canvas: " + cropCanvas.width + " × " + cropCanvas.height;
}

/*
================================
DEFAULT CROP
================================
*/

function setDefaultCrop() {
  const w = Math.round(cropCanvas.width * 0.6);
  const h = getDefaultHeightByMode(w);

  cropRect = {
    x: Math.round((cropCanvas.width - w) / 2),
    y: Math.round((cropCanvas.height - h) / 2),
    width: w,
    height: h
  };

  normalizeCropRect();
  clampCropRectToCanvas();
}

function getDefaultHeightByMode(width) {
  const mode = cropMode.value;

  if (mode === "square") return width;
  if (mode === "landscape") return Math.round(width * 3 / 4);
  if (mode === "portrait") return Math.round(width * 4 / 3);

  return Math.round(width * 0.7);
}

/*
================================
DEFAULT RESIZE VIEW
================================
*/

function setDefaultResizeView() {
  resizeView.centerX = imageNaturalWidth / 2;
  resizeView.centerY = imageNaturalHeight / 2;
  resizeView.zoom = 1;
}

/*
================================
DRAW
================================
*/

function drawCanvas() {
  if (!sourceImage) return;

  cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);

  if (activeTool === "resize") {
    drawResizeView();
  } else {
    drawCropView();
  }
}

function drawCropView() {
  cropCtx.drawImage(
    sourceImage,
    0, 0, imageNaturalWidth, imageNaturalHeight,
    0, 0, cropCanvas.width, cropCanvas.height
  );

  if (!cropRect) return;

  cropCtx.save();
  cropCtx.fillStyle = "rgba(0, 0, 0, 0.45)";
  cropCtx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);
  cropCtx.clearRect(cropRect.x, cropRect.y, cropRect.width, cropRect.height);
  cropCtx.restore();

  cropCtx.save();
  cropCtx.beginPath();
  cropCtx.rect(cropRect.x, cropRect.y, cropRect.width, cropRect.height);
  cropCtx.clip();
  cropCtx.drawImage(
    sourceImage,
    0, 0, imageNaturalWidth, imageNaturalHeight,
    0, 0, cropCanvas.width, cropCanvas.height
  );
  cropCtx.restore();

  cropCtx.strokeStyle = "#2563eb";
  cropCtx.lineWidth = 2;
  cropCtx.strokeRect(cropRect.x, cropRect.y, cropRect.width, cropRect.height);
}

function drawResizeView() {
  const view = getResizeSourceRect();

  cropCtx.drawImage(
    sourceImage,
    view.srcX, view.srcY, view.srcW, view.srcH,
    0, 0, cropCanvas.width, cropCanvas.height
  );

  cropCtx.save();
  cropCtx.strokeStyle = "#2563eb";
  cropCtx.lineWidth = 2;
  cropCtx.strokeRect(1, 1, cropCanvas.width - 2, cropCanvas.height - 2);

  cropCtx.beginPath();
  cropCtx.moveTo(cropCanvas.width / 2 - 15, cropCanvas.height / 2);
  cropCtx.lineTo(cropCanvas.width / 2 + 15, cropCanvas.height / 2);
  cropCtx.moveTo(cropCanvas.width / 2, cropCanvas.height / 2 - 15);
  cropCtx.lineTo(cropCanvas.width / 2, cropCanvas.height / 2 + 15);
  cropCtx.stroke();
  cropCtx.restore();
}

/*
================================
RESIZE RECT
================================
*/

function getResizeSourceRect() {
  const zoom = Math.max(1, resizeView.zoom);

  let srcW = imageNaturalWidth / zoom;
  let srcH = imageNaturalHeight / zoom;

  const canvasRatio = cropCanvas.width / cropCanvas.height;
  const srcRatio = srcW / srcH;

  if (srcRatio > canvasRatio) {
    srcW = srcH * canvasRatio;
  } else {
    srcH = srcW / canvasRatio;
  }

  let srcX = resizeView.centerX - srcW / 2;
  let srcY = resizeView.centerY - srcH / 2;

  srcX = Math.max(0, Math.min(srcX, imageNaturalWidth - srcW));
  srcY = Math.max(0, Math.min(srcY, imageNaturalHeight - srcH));

  return { srcX, srcY, srcW, srcH };
}

/*
================================
CROP FILE
================================
*/

async function cropSelectionToFile(file, options = {}) {
  const {
    cropRectCanvas,
    canvasWidth,
    canvasHeight,
    imageWidth,
    imageHeight,
    outputType = "image/jpeg",
    quality = 0.8,
    forceOutputExtension = "jpg"
  } = options;

  const dataUrl = await readFileAsDataURL(file);
  const image = await loadImage(dataUrl);

  const scaleX = imageWidth / canvasWidth;
  const scaleY = imageHeight / canvasHeight;

  let srcX = Math.round(cropRectCanvas.x * scaleX);
  let srcY = Math.round(cropRectCanvas.y * scaleY);
  let srcW = Math.round(cropRectCanvas.width * scaleX);
  let srcH = Math.round(cropRectCanvas.height * scaleY);

  srcX = Math.max(0, Math.min(srcX, imageWidth - 1));
  srcY = Math.max(0, Math.min(srcY, imageHeight - 1));
  srcW = Math.max(1, Math.min(srcW, imageWidth - srcX));
  srcH = Math.max(1, Math.min(srcH, imageHeight - srcY));

  const outCanvas = document.createElement("canvas");
  outCanvas.width = srcW;
  outCanvas.height = srcH;

  const outCtx = outCanvas.getContext("2d");
  if (!outCtx) throw new Error("Canvas context недоступен.");

  outCtx.drawImage(
    image,
    srcX, srcY, srcW, srcH,
    0, 0, srcW, srcH
  );

  const blob = await canvasToBlob(outCanvas, outputType, quality);
  const baseName = file.name.replace(/\.[^/.]+$/, "");

  return new File(
    [blob],
    baseName + "." + forceOutputExtension,
    { type: outputType }
  );
}

/*
================================
RESIZE FILE
================================
*/

async function resizeViewToFile(file, options = {}) {
  const {
    view,
    maxWidth = 1200,
    maxHeight = 1200,
    imageWidth,
    imageHeight,
    outputType = "image/webp",
    quality = 0.8,
    forceOutputExtension = "webp"
  } = options;

  const dataUrl = await readFileAsDataURL(file);
  const image = await loadImage(dataUrl);

  const rect = getResizeSourceRect();

  let srcX = Math.round(rect.srcX);
  let srcY = Math.round(rect.srcY);
  let srcW = Math.round(rect.srcW);
  let srcH = Math.round(rect.srcH);

  srcX = Math.max(0, Math.min(srcX, imageWidth - 1));
  srcY = Math.max(0, Math.min(srcY, imageHeight - 1));
  srcW = Math.max(1, Math.min(srcW, imageWidth - srcX));
  srcH = Math.max(1, Math.min(srcH, imageHeight - srcY));

  const scale = Math.min(
    maxWidth / srcW,
    maxHeight / srcH,
    1
  );

  const targetWidth = Math.round(srcW * scale);
  const targetHeight = Math.round(srcH * scale);

  const outCanvas = document.createElement("canvas");
  outCanvas.width = targetWidth;
  outCanvas.height = targetHeight;

  const outCtx = outCanvas.getContext("2d");
  if (!outCtx) throw new Error("Canvas context недоступен.");

  outCtx.drawImage(
    image,
    srcX, srcY, srcW, srcH,
    0, 0, targetWidth, targetHeight
  );

  const blob = await canvasToBlob(outCanvas, outputType, quality);
  const baseName = file.name.replace(/\.[^/.]+$/, "");

  return new File(
    [blob],
    baseName + "." + forceOutputExtension,
    { type: outputType }
  );
}

/*
================================
SHOW RESULT
================================
*/

async function showResult(file) {
  if (processedObjectUrl) {
    URL.revokeObjectURL(processedObjectUrl);
  }

  processedObjectUrl = URL.createObjectURL(file);
  resultPreview.src = processedObjectUrl;
  resultPreview.style.display = "block";

  const meta = await getImageMetaFromObjectUrl(processedObjectUrl);

  const savedPercent = originalFile && originalFile.size > 0
    ? (((originalFile.size - file.size) / originalFile.size) * 100).toFixed(1)
    : "0";

  resultInfo.textContent =
    "Имя: " + file.name + "\n" +
    "Тип: " + file.type + "\n" +
    "Размер: " + formatSize(file.size) + "\n" +
    "Разрешение: " + meta.width + " × " + meta.height + "\n" +
    "Экономия: " + savedPercent + "%";

  downloadBtn.disabled = false;
}

/*
================================
CROP POINTER
================================
*/

cropCanvas.addEventListener("mousedown", (event) => {
  if (!sourceImage) return;
  if (activeTool !== "crop") return;

  const pos = getMousePosOnCanvas(event);

  isSelecting = true;
  startX = pos.x;
  startY = pos.y;

  cropRect = {
    x: pos.x,
    y: pos.y,
    width: 0,
    height: 0
  };

  drawCanvas();
});

cropCanvas.addEventListener("mousemove", (event) => {
  if (!sourceImage) return;
  if (activeTool !== "crop") return;
  if (!isSelecting) return;

  const pos = getMousePosOnCanvas(event);
  updateCropByCurrentPoint(pos.x, pos.y);
  drawCanvas();
});

window.addEventListener("mouseup", () => {
  if (activeTool !== "crop") return;
  if (!isSelecting) return;

  isSelecting = false;
  normalizeCropRect();
  clampCropRectToCanvas();
  drawCanvas();
});

/*
================================
CROP TOUCH
================================
*/

cropCanvas.addEventListener("touchstart", (event) => {
  if (!sourceImage) return;
  if (activeTool !== "crop") return;
  if (event.touches.length !== 1) return;

  event.preventDefault();

  const pos = getTouchPosOnCanvas(event);

  isSelecting = true;
  startX = pos.x;
  startY = pos.y;

  cropRect = {
    x: pos.x,
    y: pos.y,
    width: 0,
    height: 0
  };

  drawCanvas();
}, { passive: false });

cropCanvas.addEventListener("touchmove", (event) => {
  if (!sourceImage) return;

  if (activeTool === "crop") {
    if (!isSelecting || event.touches.length !== 1) return;

    event.preventDefault();

    const pos = getTouchPosOnCanvas(event);
    updateCropByCurrentPoint(pos.x, pos.y);
    drawCanvas();
    return;
  }

  if (activeTool === "resize" && event.touches.length === 2) {
    event.preventDefault();

    const distance = getTouchDistance(event);
    if (pinchStartDistance === null) return;

    const ratio = distance / pinchStartDistance;
    resizeView.zoom = clamp(resizeView.zoom = pinchStartZoom * ratio, 1, 20);
    drawCanvas();
  }
}, { passive: false });

window.addEventListener("touchend", (event) => {
  if (activeTool === "crop" && isSelecting) {
    isSelecting = false;
    normalizeCropRect();
    clampCropRectToCanvas();
    drawCanvas();
  }

  if (activeTool === "resize") {
    if (event.touches && event.touches.length < 2) {
      pinchStartDistance = null;
    }
  }
}, { passive: false });

/*
================================
RESIZE CLICK CENTER
================================
*/

cropCanvas.addEventListener("click", (event) => {
  if (!sourceImage) return;
  if (activeTool !== "resize") return;

  const pos = getMousePosOnCanvas(event);
  setResizeCenterFromCanvasPoint(pos.x, pos.y);
  drawCanvas();
});

/*
================================
RESIZE WHEEL
================================
*/

cropCanvas.addEventListener("wheel", (event) => {
  if (!sourceImage) return;
  if (activeTool !== "resize") return;

  event.preventDefault();

  const delta = event.deltaY < 0 ? 1.1 : 0.9;
  resizeView.zoom = clamp(resizeView.zoom * delta, 1, 20);
  drawCanvas();
}, { passive: false });

/*
================================
RESIZE PINCH START
================================
*/

cropCanvas.addEventListener("touchstart", (event) => {
  if (!sourceImage) return;
  if (activeTool !== "resize") return;

  if (event.touches.length === 1) {
    event.preventDefault();
    const pos = getTouchPosOnCanvas(event);
    setResizeCenterFromCanvasPoint(pos.x, pos.y);
    drawCanvas();
  }

  if (event.touches.length === 2) {
    event.preventDefault();
    pinchStartDistance = getTouchDistance(event);
    pinchStartZoom = resizeView.zoom;
  }
}, { passive: false });

/*
================================
HELPERS FOR CROP
================================
*/

function updateCropByCurrentPoint(currentX, currentY) {
  let x = startX;
  let y = startY;
  let width = currentX - startX;
  let height = currentY - startY;

  const mode = cropMode.value;

  if (mode !== "free") {
    const ratio = getCropRatio(mode);
    const absWidth = Math.abs(width);
    const absHeight = Math.abs(height);

    if (absWidth / ratio > absHeight) {
      height = Math.sign(height || 1) * Math.round(absWidth / ratio);
    } else {
      width = Math.sign(width || 1) * Math.round(absHeight * ratio);
    }
  }

  cropRect = { x, y, width, height };
  normalizeCropRect();
  clampCropRectToCanvas();
}

function normalizeCropRect() {
  if (!cropRect) return;

  if (cropRect.width < 0) {
    cropRect.x += cropRect.width;
    cropRect.width = Math.abs(cropRect.width);
  }

  if (cropRect.height < 0) {
    cropRect.y += cropRect.height;
    cropRect.height = Math.abs(cropRect.height);
  }
}

function clampCropRectToCanvas() {
  if (!cropRect) return;

  if (cropRect.x < 0) {
    cropRect.width += cropRect.x;
    cropRect.x = 0;
  }

  if (cropRect.y < 0) {
    cropRect.height += cropRect.y;
    cropRect.y = 0;
  }

  if (cropRect.x + cropRect.width > cropCanvas.width) {
    cropRect.width = cropCanvas.width - cropRect.x;
  }

  if (cropRect.y + cropRect.height > cropCanvas.height) {
    cropRect.height = cropCanvas.height - cropRect.y;
  }

  cropRect.width = Math.max(1, cropRect.width);
  cropRect.height = Math.max(1, cropRect.height);
}

/*
================================
HELPERS FOR RESIZE
================================
*/

function setResizeCenterFromCanvasPoint(canvasX, canvasY) {
  const rect = getResizeSourceRect();

  const relX = canvasX / cropCanvas.width;
  const relY = canvasY / cropCanvas.height;

  resizeView.centerX = rect.srcX + rect.srcW * relX;
  resizeView.centerY = rect.srcY + rect.srcH * relY;

  resizeView.centerX = clamp(resizeView.centerX, 0, imageNaturalWidth);
  resizeView.centerY = clamp(resizeView.centerY, 0, imageNaturalHeight);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function getCropRatio(mode) {
  if (mode === "square") return 1 / 1;
  if (mode === "landscape") return 4 / 3;
  if (mode === "portrait") return 3 / 4;
  return null;
}

function getMousePosOnCanvas(event) {
  const rect = cropCanvas.getBoundingClientRect();
  const scaleX = cropCanvas.width / rect.width;
  const scaleY = cropCanvas.height / rect.height;

  return {
    x: Math.round((event.clientX - rect.left) * scaleX),
    y: Math.round((event.clientY - rect.top) * scaleY)
  };
}

function getTouchPosOnCanvas(event) {
  const touch = event.touches[0] || event.changedTouches[0];
  const rect = cropCanvas.getBoundingClientRect();
  const scaleX = cropCanvas.width / rect.width;
  const scaleY = cropCanvas.height / rect.height;

  return {
    x: Math.round((touch.clientX - rect.left) * scaleX),
    y: Math.round((touch.clientY - rect.top) * scaleY)
  };
}

function getTouchDistance(event) {
  const t1 = event.touches[0];
  const t2 = event.touches[1];
  const dx = t2.clientX - t1.clientX;
  const dy = t2.clientY - t1.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

/*
================================
COMMON HELPERS
================================
*/

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Ошибка чтения файла."));
    reader.readAsDataURL(file);
  });
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("Ошибка загрузки изображения."));
    img.src = src;
  });
}

function canvasToBlob(canvas, type, quality) {
  return new Promise((resolve, reject) => {
    canvas.toBlob((blob) => {
      if (!blob) {
        reject(new Error("Не удалось создать Blob."));
        return;
      }
      resolve(blob);
    }, type, quality);
  });
}

function getImageMetaFromObjectUrl(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve({ width: img.width, height: img.height });
    img.onerror = () => reject(new Error("Не удалось прочитать размеры результата."));
    img.src = url;
  });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / 1024 / 1024).toFixed(2) + " MB";
}

function setStatus(text) {
  statusBox.textContent = text;
}

function clearStatus() {
  statusBox.textContent = "";
}

function clearCanvas() {
  cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
  cropCanvas.style.display = "none";
  sourceImage = null;
  cropRect = null;
}

function resetResult() {
  if (processedObjectUrl) {
    URL.revokeObjectURL(processedObjectUrl);
    processedObjectUrl = null;
  }

  processedFile = null;
  resultPreview.src = "";
  resultPreview.style.display = "none";
  resultInfo.textContent = "";
  downloadBtn.disabled = true;
}
</script>

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();
