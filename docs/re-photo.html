  
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>re-photo</title>

<!-- СТИЛЬ КОНСОЛИ -->

  <link rel="stylesheet"
        href="styles/console.css" />
  
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

h2, h3 {
  margin-top: 0;
}

.controls {
  margin-bottom: 24px;
}

.controls-row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px 18px;
  margin-bottom: 16px;
  align-items: end;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-size: 14px;
  color: #333;
}

.field input,
.field select {
  padding: 8px 10px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  min-width: 130px;
}

.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 12px;
}

button {
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

button:disabled {
  background: #94a3b8;
  cursor: not-allowed;
}

.status {
  margin-top: 14px;
  color: #b91c1c;
  min-height: 20px;
}

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.panel {
  flex: 1 1 460px;
  background: #fafafa;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 16px;
}

.preview-box {
  min-height: 320px;
  background: #e5e7eb;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.preview-box img {
  max-width: 100%;
  max-height: 520px;
  display: none;
}

.info {
  margin-top: 12px;
  font-size: 14px;
  color: #444;
  white-space: pre-line;
}
</style>
</head>
<body>

<div class="container">

  <h2>Обработка фото</h2>

  <div class="controls">

    <div class="controls-row">
      <div class="field">
        <label for="photoInput">Файл</label>
        <input id="photoInput" type="file" accept="image/*">
      </div>

      <div class="field">
        <label for="cropMode">Кроп</label>
        <select id="cropMode">
          <option value="none">Без кропа</option>
          <option value="square">Квадрат 1:1</option>
          <option value="landscape">Горизонтально 4:3</option>
          <option value="portrait">Вертикально 3:4</option>
        </select>
      </div>

      <div class="field">
        <label for="maxWidth">Max width</label>
        <input id="maxWidth" type="number" value="1200" min="100" step="50">
      </div>

      <div class="field">
        <label for="maxHeight">Max height</label>
        <input id="maxHeight" type="number" value="1200" min="100" step="50">
      </div>

      <div class="field">
        <label for="quality">Quality</label>
        <input id="quality" type="number" value="0.75" min="0.1" max="1" step="0.05">
      </div>
    </div>

    <div class="buttons">
      <!-- Кнопка просто показывает выбранный исходник -->
      <button id="showOriginalBtn" type="button">Показать исходник</button>

      <!-- Только кроп по центру, без изменения формата -->
      <button id="cropBtn" type="button">Кроп по центру</button>

      <!-- Только resize, без кропа -->
      <button id="resizeBtn" type="button">Resize</button>

      <!-- Полная обработка: crop + resize + webp -->
      <button id="fullProcessBtn" type="button">Кроп + Resize + WebP</button>

      <!-- Скачать результат -->
      <button id="downloadBtn" type="button" disabled>Скачать результат</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <div class="row">
    <div class="panel">
      <h3>Исходник</h3>
      <div class="preview-box">
        <img id="originalPreview" alt="Исходник">
      </div>
      <div class="info" id="originalInfo"></div>
    </div>

    <div class="panel">
      <h3>Результат</h3>
      <div class="preview-box">
        <img id="resultPreview" alt="Результат">
      </div>
      <div class="info" id="resultInfo"></div>
    </div>
  </div>

</div>

<script>
/*
================================
Глобальные переменные
================================
*/

let originalFile = null;
let originalObjectUrl = null;
let processedFile = null;
let processedObjectUrl = null;

/*
================================
DOM
================================
*/

const photoInput = document.getElementById("photoInput");
const cropMode = document.getElementById("cropMode");
const maxWidthInput = document.getElementById("maxWidth");
const maxHeightInput = document.getElementById("maxHeight");
const qualityInput = document.getElementById("quality");

const showOriginalBtn = document.getElementById("showOriginalBtn");
const cropBtn = document.getElementById("cropBtn");
const resizeBtn = document.getElementById("resizeBtn");
const fullProcessBtn = document.getElementById("fullProcessBtn");
const downloadBtn = document.getElementById("downloadBtn");

const originalPreview = document.getElementById("originalPreview");
const resultPreview = document.getElementById("resultPreview");
const originalInfo = document.getElementById("originalInfo");
const resultInfo = document.getElementById("resultInfo");
const statusBox = document.getElementById("status");

/*
================================
Выбор файла
================================
*/

photoInput.addEventListener("change", async (event) => {
  clearStatus();
  resetResult();

  originalFile = event.target.files[0] || null;

  if (!originalFile) {
    clearOriginal();
    return;
  }

  await showOriginal();
});

/*
================================
Кнопки
================================
*/

showOriginalBtn.addEventListener("click", async () => {
  if (!originalFile) {
    setStatus("Сначала выбери фото.");
    return;
  }
  await showOriginal();
});

cropBtn.addEventListener("click", async () => {
  if (!originalFile) {
    setStatus("Сначала выбери фото.");
    return;
  }

  try {
    clearStatus();

    processedFile = await processImage(originalFile, {
      doCrop: true,
      cropMode: cropMode.value,
      doResize: false,
      maxWidth: Number(maxWidthInput.value) || 1200,
      maxHeight: Number(maxHeightInput.value) || 1200,
      outputType: "image/jpeg",
      quality: Number(qualityInput.value) || 0.75,
      forceOutputExtension: "jpg"
    });

    await showResult(processedFile);
    setStatus("Готово: только кроп.");
  } catch (error) {
    setStatus("Ошибка: " + error.message);
  }
});

resizeBtn.addEventListener("click", async () => {
  if (!originalFile) {
    setStatus("Сначала выбери фото.");
    return;
  }

  try {
    clearStatus();

    processedFile = await processImage(originalFile, {
      doCrop: false,
      cropMode: "none",
      doResize: true,
      maxWidth: Number(maxWidthInput.value) || 1200,
      maxHeight: Number(maxHeightInput.value) || 1200,
      outputType: "image/jpeg",
      quality: Number(qualityInput.value) || 0.75,
      forceOutputExtension: "jpg"
    });

    await showResult(processedFile);
    setStatus("Готово: только resize.");
  } catch (error) {
    setStatus("Ошибка: " + error.message);
  }
});

fullProcessBtn.addEventListener("click", async () => {
  if (!originalFile) {
    setStatus("Сначала выбери фото.");
    return;
  }

  try {
    clearStatus();

    processedFile = await processImage(originalFile, {
      doCrop: cropMode.value !== "none",
      cropMode: cropMode.value,
      doResize: true,
      maxWidth: Number(maxWidthInput.value) || 1200,
      maxHeight: Number(maxHeightInput.value) || 1200,
      outputType: "image/webp",
      quality: Number(qualityInput.value) || 0.75,
      forceOutputExtension: "webp"
    });

    await showResult(processedFile);
    setStatus("Готово: кроп + resize + webp.");
  } catch (error) {
    setStatus("Ошибка: " + error.message);
  }
});

downloadBtn.addEventListener("click", () => {
  if (!processedFile || !processedObjectUrl) {
    setStatus("Нет результата для скачивания.");
    return;
  }

  const a = document.createElement("a");
  a.href = processedObjectUrl;
  a.download = processedFile.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
});

/*
================================
Показ исходника
================================
*/

async function showOriginal() {
  if (originalObjectUrl) {
    URL.revokeObjectURL(originalObjectUrl);
  }

  originalObjectUrl = URL.createObjectURL(originalFile);

  originalPreview.src = originalObjectUrl;
  originalPreview.style.display = "block";

  const meta = await getImageMetaFromObjectUrl(originalObjectUrl);

  originalInfo.textContent =
    "Имя: " + originalFile.name + "\n" +
    "Тип: " + originalFile.type + "\n" +
    "Размер: " + formatSize(originalFile.size) + "\n" +
    "Разрешение: " + meta.width + " × " + meta.height;
}

/*
================================
Показ результата
================================
*/

async function showResult(file) {
  if (processedObjectUrl) {
    URL.revokeObjectURL(processedObjectUrl);
  }

  processedObjectUrl = URL.createObjectURL(file);

  resultPreview.src = processedObjectUrl;
  resultPreview.style.display = "block";

  const meta = await getImageMetaFromObjectUrl(processedObjectUrl);

  const savedPercent = originalFile && originalFile.size > 0
    ? (((originalFile.size - file.size) / originalFile.size) * 100).toFixed(1)
    : "0";

  resultInfo.textContent =
    "Имя: " + file.name + "\n" +
    "Тип: " + file.type + "\n" +
    "Размер: " + formatSize(file.size) + "\n" +
    "Разрешение: " + meta.width + " × " + meta.height + "\n" +
    "Экономия: " + savedPercent + "%";

  downloadBtn.disabled = false;
}

/*
================================
Главная обработка
================================
*/

async function processImage(file, options = {}) {
  const {
    doCrop = false,
    cropMode = "none",
    doResize = true,
    maxWidth = 1200,
    maxHeight = 1200,
    outputType = "image/webp",
    quality = 0.8,
    forceOutputExtension = "webp"
  } = options;

  if (!file) {
    throw new Error("Файл не передан.");
  }

  if (!file.type.startsWith("image/")) {
    throw new Error("Нужен файл изображения.");
  }

  const dataUrl = await readFileAsDataURL(file);
  const image = await loadImage(dataUrl);

  let srcX = 0;
  let srcY = 0;
  let srcW = image.width;
  let srcH = image.height;

  /*
  ================================================
  КРОП ПО ЦЕНТРУ
  Если doCrop=true, берём центральную область
  ================================================
  */
  if (doCrop && cropMode !== "none") {
    const ratio = getCropRatio(cropMode);
    const crop = getCenteredCrop(image.width, image.height, ratio);
    srcX = crop.srcX;
    srcY = crop.srcY;
    srcW = crop.srcW;
    srcH = crop.srcH;
  }

  /*
  ================================================
  RESIZE
  Если doResize=true, уменьшаем до лимитов
  Если false — сохраняем размер вырезанной области
  ================================================
  */
  let targetWidth = srcW;
  let targetHeight = srcH;

  if (doResize) {
    const scale = Math.min(
      maxWidth / srcW,
      maxHeight / srcH,
      1
    );

    targetWidth = Math.round(srcW * scale);
    targetHeight = Math.round(srcH * scale);
  }

  const canvas = document.createElement("canvas");
  canvas.width = targetWidth;
  canvas.height = targetHeight;

  const ctx = canvas.getContext("2d");

  if (!ctx) {
    throw new Error("Canvas context недоступен.");
  }

  /*
  ================================================
  Рисуем:
  srcX/srcY/srcW/srcH — какую область взять из исходника
  0/0/targetWidth/targetHeight — в какой размер вывести
  ================================================
  */
  ctx.drawImage(
    image,
    srcX, srcY, srcW, srcH,
    0, 0, targetWidth, targetHeight
  );

  const blob = await canvasToBlob(canvas, outputType, quality);

  const baseName = file.name.replace(/\.[^/.]+$/, "");

  return new File(
    [blob],
    baseName + "." + forceOutputExtension,
    { type: outputType }
  );
}

/*
================================
Пропорции кропа
================================
*/

function getCropRatio(mode) {
  if (mode === "square") return 1 / 1;
  if (mode === "landscape") return 4 / 3;
  if (mode === "portrait") return 3 / 4;
  return null;
}

/*
================================
Центрированный кроп
================================
*/

function getCenteredCrop(width, height, ratio) {
  if (!ratio) {
    return {
      srcX: 0,
      srcY: 0,
      srcW: width,
      srcH: height
    };
  }

  const currentRatio = width / height;

  let srcW;
  let srcH;
  let srcX;
  let srcY;

  /*
  Если картинка слишком широкая —
  режем слева и справа поровну
  */
  if (currentRatio > ratio) {
    srcH = height;
    srcW = Math.round(height * ratio);
    srcX = Math.round((width - srcW) / 2);
    srcY = 0;
  }
  /*
  Если картинка слишком высокая —
  режем сверху и снизу поровну
  */
  else {
    srcW = width;
    srcH = Math.round(width / ratio);
    srcX = 0;
    srcY = Math.round((height - srcH) / 2);
  }

  return { srcX, srcY, srcW, srcH };
}

/*
================================
Helpers
================================
*/

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Ошибка чтения файла."));
    reader.readAsDataURL(file);
  });
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("Ошибка загрузки изображения."));
    img.src = src;
  });
}

function canvasToBlob(canvas, type, quality) {
  return new Promise((resolve, reject) => {
    canvas.toBlob((blob) => {
      if (!blob) {
        reject(new Error("Не удалось создать Blob."));
        return;
      }
      resolve(blob);
    }, type, quality);
  });
}

function getImageMetaFromObjectUrl(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve({
      width: img.width,
      height: img.height
    });
    img.onerror = () => reject(new Error("Не удалось прочитать размер изображения."));
    img.src = url;
  });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / 1024 / 1024).toFixed(2) + " MB";
}

function setStatus(text) {
  statusBox.textContent = text;
}

function clearStatus() {
  statusBox.textContent = "";
}

function clearOriginal() {
  originalPreview.src = "";
  originalPreview.style.display = "none";
  originalInfo.textContent = "";
}

function resetResult() {
  if (processedObjectUrl) {
    URL.revokeObjectURL(processedObjectUrl);
    processedObjectUrl = null;
  }
  processedFile = null;
  resultPreview.src = "";
  resultPreview.style.display = "none";
  resultInfo.textContent = "";
  downloadBtn.disabled = true;
}
</script>



<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->
кроп по центру (разные режимы)
resize с сохранением пропорций
    с кнопками| v1.2.1

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

  </body>
</html>
