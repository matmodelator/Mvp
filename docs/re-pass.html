<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />
  <title>Восстановление пароля</title>

<!-- ========================================
     СТИЛЬ СЕРВИСНОЙ КОНСОЛИ
======================================== -->

  <link rel="stylesheet"
        href="styles/console.css" />

  <style>

    /* ========================================
       БАЗОВАЯ РАЗМЕТКА СТРАНИЦЫ
    ======================================== */

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;

      /* Центрирование блока по экрану */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ========================================
       ОСНОВНОЙ БЛОК
    ======================================== */

    .box {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 24px;
    }

    p {
      color: #555;
      line-height: 1.5;
      font-size: 14px;
    }

    /* ========================================
       ПОЛЯ ВВОДА
    ======================================== */

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
    }

    /* ========================================
       КНОПКА
    ======================================== */

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    /* ========================================
       БЛОК СООБЩЕНИЙ
       ВАЖНО:
       white-space: pre-line
       позволяет делать перенос строк через \n
    ======================================== */

    #status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;

      /* перенос строк из JS */
      white-space: pre-line;
    }

    .success {
      color: green;
    }

    .error {
      color: #b00020;
    }

    /* ========================================
       ССЫЛКА НАЗАД
    ======================================== */

    .link-back {
      display: block;
      margin-top: 18px;
      text-align: center;
      text-decoration: none;
      color: #2563eb;
    }

  </style>
</head>

<body>

  <div class="box">

    <h1>Восстановление пароля</h1>

    <!-- ========================================
         ОПИСАНИЕ
         Перенос по предложениям через <br>
    ======================================== -->

    <p>
      Введите email, указанный при регистрации.<br>
      На него будет отправлен код для смены пароля.
    </p>

    <!-- ========================================
         ФОРМА ВОССТАНОВЛЕНИЯ
    ======================================== -->

    <form id="recoveryForm">

      <!-- EMAIL -->

      <input
        id="email"
        type="email"
        placeholder="Email"
        required
      />

      <!-- КНОПКА ОТПРАВКИ -->

      <button type="submit">
        Отправить код
      </button>

    </form>

    <!-- ========================================
         СООБЩЕНИЯ
    ======================================== -->

    <div id="status"></div>

    <!-- ========================================
         КНОПКА ПЕРЕХОДА К ОБНОВЛЕНИЮ ПАРОЛЯ
    ======================================== -->

    <button
      id="goUpdateBtn"
      onclick="goToUpdate()"
      style="display:none; margin-top:12px;"
    >
      Переход к обновлению пароля
    </button>

    <!-- ========================================
         КНОПКА НАЗАД
    ======================================== -->

    <a
      class="link-back"
      href="index.html"
    >
      Назад
    </a>

  </div>


<!-- ========================================
     ЛОГИКА ВОССТАНОВЛЕНИЯ ПАРОЛЯ
======================================== -->

<script type="module">

 import { supabase }
 from './supabase-config.js'

  const form =
    document.getElementById('recoveryForm')

  const emailInput =
    document.getElementById('email')

  const statusEl =
    document.getElementById('status')

  const goUpdateBtn =
    document.getElementById('goUpdateBtn')

  /* ========================================
     ПЕРЕХОД НА СТРАНИЦУ ОБНОВЛЕНИЯ ПАРОЛЯ
  ======================================== */

  function goToUpdate() {

    const email =
      emailInput.value.trim()

    window.location.href =
      'up-pass.html?email='
      + encodeURIComponent(email)

  }

  window.goToUpdate =
    goToUpdate

  /* ========================================
     ОБРАБОТКА ОТПРАВКИ ФОРМЫ
  ======================================== */

  form.addEventListener(
    'submit',
    async function (e) {

      e.preventDefault()

      /* Сообщение: отправка */

      statusEl.textContent =
        'Отправляем код...'

      statusEl.className = ''

      goUpdateBtn.style.display =
        'none'

      const email =
        emailInput.value.trim()

      /* ========================================
         ОТПРАВКА КОДА В SUPABASE
      ======================================== */

      const { error } =
        await supabase.auth.resetPasswordForEmail(
          email
        )

      /* ========================================
         ОШИБКА
      ======================================== */

      if (error) {

        statusEl.textContent =
          'Ошибка:\n'
          + error.message

        statusEl.className =
          'error'

        return
      }

      /* ========================================
         УСПЕХ
         Перенос строк через \n
      ======================================== */

      statusEl.textContent =
        'Если это правильный адрес,\n'
        + 'код отправлен.\n'
        + 'Нажмите кнопку ниже.'

      statusEl.className =
        'success'

      goUpdateBtn.style.display =
        'block'

    }
  )

</script>


<!-- ========================================
     SERVICE CONSOLE
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВЕРСИЯ СТРАНИЦЫ -->

    no timer + update button | v1.1.2

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>


<!-- ========================================
     АВТОВЫВОД ДАТЫ И ВРЕМЕНИ
======================================== -->

<script>

(function () {

  const now = new Date()

  const pad =
    n => String(n).padStart(2, '0')

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear()

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes())

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time

})()

</script>

</body>
</html>
