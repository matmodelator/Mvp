<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Восстановление пароля</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 24px;
    }

    p {
      color: #555;
      line-height: 1.5;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    .success {
      color: green;
    }

    .error {
      color: #b00020;
    }

    .link-back {
      display: block;
      margin-top: 18px;
      text-align: center;
      text-decoration: none;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Восстановление пароля</h1>

    <p>
      Введите email, указанный при регистрации.
      На него будет отправлена ссылка для смены пароля.
    </p>

    <form id="recoveryForm">
      <input
        id="email"
        type="email"
        placeholder="Email"
        required
      />
      <button type="submit">Отправить ссылку</button>
    </form>

    <div id="status"></div>

    <a class="link-back" href="index.html">Назад</a>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'YOUR_SUPABASE_URL'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZub2RicGl3a2tyZGdxdm15YW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDk5MDAsImV4cCI6MjA4OTAyNTkwMH0.Gi4l3LAU3S4T77_2xgVWKmkeW34xblrJf04IlE4zu9I'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const form = document.getElementById('recoveryForm')
    const emailInput = document.getElementById('email')
    const statusEl = document.getElementById('status')

    form.addEventListener('submit', async function (e) {
      e.preventDefault()

      statusEl.textContent = 'Отправляем письмо...'
      statusEl.className = ''

      const email = emailInput.value.trim()

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://matmodelator.github.io/Mvp/up-pass.html'
      })

      if (error) {
        statusEl.textContent = 'Ошибка: ' + error.message
        statusEl.className = 'error'
        return
      }

      statusEl.textContent =
        'Если такой email существует, ссылка для смены пароля отправлена.'
      statusEl.className = 'success'
    })
  </script>
</body>
</html>
