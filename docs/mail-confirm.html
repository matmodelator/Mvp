<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход по коду</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      box-sizing: border-box;
    }

    h2 {
      margin: 0 0 18px 0;
      text-align: center;
    }

    .field {
      margin-bottom: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #cfd6dd;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      margin-top: 16px;
      text-align: center;
      font-size: 15px;
      min-height: 22px;
      line-height: 1.4;
    }

    .user-data {
      margin-top: 12px;
      font-size: 14px;
      color: #374151;
      word-break: break-word;
      text-align: center;
      min-height: 18px;
      line-height: 1.4;
    }

    .buttons-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .buttons-row button {
      margin-top: 0;
    }
  </style>
</head>

<body>

  <div class="box">

    <button class="secondary" onclick="goBack()">
      Назад
    </button>

    <h2>Вход по коду из email</h2>

    <div class="field">
      <input
        id="email"
        type="email"
        placeholder="Введите email"
        autocomplete="email"
      />
    </div>

    <button class="primary" onclick="sendCode()">
      Отправить код
    </button>

    <div class="field" style="margin-top: 14px;">
      <input
        id="code"
        type="text"
        inputmode="numeric"
        placeholder="Введите код из письма"
        autocomplete="one-time-code"
      />
    </div>

    <button class="primary" onclick="confirmCode()">
      Подтвердить код
    </button>

    <div class="buttons-row">
      <button class="secondary" onclick="checkSession()">
        Проверить сессию
      </button>

      <button class="secondary" onclick="goHome()">
        На главную
      </button>
    </div>

    <div id="status" class="status"></div>
    <div id="userData" class="user-data"></div>

  </div>

  <script type="module">
    import { createClient }
    from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient(
      'https://fnodbpiwkkrdgqvmyanq.supabase.co',
      'sb_publishable_9GjllWmCfI2E7okWGOG9Wg_qCh8Gv6T'
    )

    const emailInput = document.getElementById('email')
    const codeInput = document.getElementById('code')
    const statusText = document.getElementById('status')
    const userDataText = document.getElementById('userData')

    function getEmailFromUrl() {
      const params = new URLSearchParams(window.location.search)
      return (params.get('email') || '').trim()
    }

    function getSavedEmail() {
      return (
        localStorage.getItem('email') ||
        sessionStorage.getItem('email') ||
        ''
      ).trim()
    }

    function resolveEmail() {
      return (
        emailInput.value.trim() ||
        getEmailFromUrl() ||
        getSavedEmail()
      )
    }

    function fillEmail() {
      const email = getEmailFromUrl() || getSavedEmail()
      if (email) {
        emailInput.value = email
      }
    }

    async function sendCode() {
      const email = resolveEmail()

      statusText.textContent = ''
      userDataText.textContent = ''

      if (!email) {
        statusText.textContent = 'Ошибка: введите email'
        return
      }

      statusText.textContent = 'Отправляем код...'

      try {
        const { data, error } = await supabase.auth.signInWithOtp({
          email: email,
          options: {
            shouldCreateUser: false
          }
        })

        if (error) {
          statusText.textContent = 'Ошибка: ' + error.message
          return
        }

        localStorage.setItem('email', email)
        sessionStorage.setItem('email', email)

        statusText.textContent =
          'Код отправлен на почту. Проверьте inbox.'
        userDataText.textContent =
          'data.user = null, data.session = null — это нормально до ввода кода.'
      } catch (err) {
        statusText.textContent = 'Ошибка: ' + err.message
      }
    }

    async function confirmCode() {
      const email = resolveEmail()
      const code = codeInput.value.trim()

      statusText.textContent = ''
      userDataText.textContent = ''

      if (!email) {
        statusText.textContent = 'Ошибка: введите email'
        return
      }

      if (!code) {
        statusText.textContent = 'Ошибка: введите код'
        return
      }

      statusText.textContent = 'Проверяем код...'

      try {
        const {
          data: { session },
          error
        } = await supabase.auth.verifyOtp({
          email: email,
          token: code,
          type: 'email'
        })

        if (error) {
          statusText.textContent = 'Ошибка: ' + error.message
          return
        }

        if (!session || !session.user) {
          statusText.textContent =
            'Код принят, но сессия не получена'
          return
        }

        const user = session.user

        statusText.textContent = 'Вход выполнен'
        userDataText.textContent =
          'ID: ' + user.id + ' | EMAIL: ' + user.email

        setTimeout(function () {
          window.location.href =
            'account.html?id=' +
            encodeURIComponent(user.id) +
            '&email=' +
            encodeURIComponent(user.email)
        }, 1000)

      } catch (err) {
        statusText.textContent = 'Ошибка: ' + err.message
      }
    }

    async function checkSession() {
      statusText.textContent = 'Проверяем сессию...'
      userDataText.textContent = ''

      try {
        const { data, error } = await supabase.auth.getUser()

        if (error || !data.user) {
          statusText.textContent = 'Сессия не найдена'
          return
        }

        const user = data.user

        statusText.textContent = 'Пользователь уже вошел'
        userDataText.textContent =
          'ID: ' + user.id + ' | EMAIL: ' + user.email

      } catch (err) {
        statusText.textContent = 'Ошибка: ' + err.message
      }
    }

    function goBack() {
      window.location.href = 'index.html'
    }

    function goHome() {
      window.location.href = 'main.html'
    }

    window.sendCode = sendCode
    window.confirmCode = confirmCode
    window.checkSession = checkSession
    window.goBack = goBack
    window.goHome = goHome

    fillEmail()
  </script>

</body>
</html>
