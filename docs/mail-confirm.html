<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Подтверждение почты</title>
</head>

<body>

<button onclick="window.location.href='index.html'">
  Назад
</button>

<h2>
  Подтверждение почты
</h2>

<div>
  <p id="status">
    Проверяем подтверждение...
  </p>
</div>

<br>

<div>
  <button onclick="checkEmail()">
    Проверить снова
  </button>

  <button onclick="goMain()">
    На главную
  </button>
</div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://fnodbpiwkkrdgqvmyanq.supabase.co',
  'sb_publishable_9GjllWmCfI2E7okWGOG9Wg_qCh8Gv6T'
)

const statusText =
  document.getElementById('status')

async function checkEmail() {

  statusText.textContent =
    'Проверяем...'

  const { data, error } =
    await supabase.auth.getUser()

  if (error || !data.user) {

    statusText.textContent =
      'Пользователь не найден'

    return
  }

  const user =
    data.user

  if (user.email_confirmed_at) {

    statusText.textContent =
      'Почта подтверждена'

    const userId =
      encodeURIComponent(user.id)

    const userEmail =
      encodeURIComponent(user.email || '')

    setTimeout(function () {

      window.location.href =
        `account.html?id=${userId}&email=${userEmail}`

    }, 1000)

  }
  else {

    statusText.textContent =
      'Почта еще не подтверждена'

  }

}

function goMain() {

  window.location.href =
    'main.html'

}

window.goMain = goMain
window.checkEmail = checkEmail

checkEmail()

</script>

</body>
</html>
