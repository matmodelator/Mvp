<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Подтверждение почты</title>

  <!--
  ========================================
  ОБЩИЕ СТИЛИ СТАРТОВЫХ СТРАНИЦ
  ========================================
  -->
  <link rel="stylesheet" href="styles/start.css" />

</head>

<body>

<header>
  <h1>Dating App MVP</h1>
</header>

<div class="container">

  <h2>Подтверждение почты</h2>

  <!--
  ========================================
  СТАТУС
  ========================================
  -->
  <div id="message" class="msg">
    Отправляем письмо для подтверждения...
  </div>

  <!--
  ========================================
  КНОПКИ ПЕРЕХОДА
  ========================================
  -->
  <div class="buttons">

    <button
      id="toLog"
      class="submit-button"
      style="display: none;"
    >
      На log
    </button>

    <button
      id="toIndex"
      class="secondary-button"
      style="display: none;"
    >
      На index
    </button>

  </div>

</div>

<script type="module">

/*
================================
ПОДКЛЮЧАЕМ SUPABASE
================================
*/

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://fnodbpiwkkrdgqvmyanq.supabase.co',
  'sb_publishable_9GjllWmCfI2E7okWGOG9Wg_qCh8Gv6T'
)

/*
================================
ЭЛЕМЕНТЫ СТРАНИЦЫ
================================
*/

const message =
  document.getElementById('message')

const toLog =
  document.getElementById('toLog')

const toIndex =
  document.getElementById('toIndex')

/*
================================
ПОКАЗАТЬ КНОПКИ
================================
*/

function showButtons() {
  toLog.style.display = 'block'
  toIndex.style.display = 'block'
}

/*
================================
ОТПРАВИТЬ ПИСЬМО ВЕРИФИКАЦИИ

ВАЖНО:
этот файл не проверяет user через getUser()
а именно отправляет запрос на письмо
через supabase.auth.resend(...)
================================
*/

async function sendVerificationEmail() {

  const pendingEmail =
    localStorage.getItem('pendingEmail')

  /*
  ЕСЛИ EMAIL НЕ СОХРАНЕН
  */

  if (!pendingEmail) {

    message.textContent =
      'Не найден e-mail для верификации'

    message.className =
      'msg error'

    showButtons()
    return
  }

  /*
  ОТПРАВЛЯЕМ ПИСЬМО ПОДТВЕРЖДЕНИЯ
  */

  const { error } =
    await supabase.auth.resend({
      type: 'signup',
      email: pendingEmail
    })

  /*
  ЕСЛИ ЕСТЬ ОШИБКА
  */

  if (error) {

    message.textContent =
      error.message

    message.className =
      'msg error'

    showButtons()
    return
  }

  /*
  ЕСЛИ ПИСЬМО УШЛО
  */

  message.textContent =
    'Письмо для подтверждения e-mail отправлено. Проверьте почту.'

  message.className =
    'msg success'

  showButtons()

}

/*
================================
ПЕРЕХОДЫ
================================
*/

toLog.addEventListener('click', function () {
  window.location.href = 'log.html'
})

toIndex.addEventListener('click', function () {
  window.location.href = 'index.html'
})

/*
================================
ЗАПУСК ПРИ ЗАГРУЗКЕ
================================
*/

sendVerificationEmail()

</script>

</body>
</html>
