<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Подтверждение почты</title>

  <!--
  ========================================
  ОБЩИЕ СТИЛИ СТАРТОВЫХ СТРАНИЦ
  ========================================
  -->
  <link rel="stylesheet" href="styles/start.css" />

</head>

<body>

<header>
  <h1>Dating App MVP</h1>
</header>

<div class="container">

  <!--
  ========================================
  ЗАГОЛОВОК СТРАНИЦЫ
  ========================================
  -->
  <h2>Подтверждение почты</h2>

  <!--
  ========================================
  СТАТУС ПРОВЕРКИ
  ========================================
  -->
  <div id="status" class="msg">
    Проверяем подтверждение...
  </div>

  <!--
  ========================================
  КНОПКИ ПЕРЕХОДА
  ========================================
  -->
  <div class="buttons">

    <button
      id="goIndexButton"
      class="secondary-button"
      type="button"
    >
      На index
    </button>

    <button
      id="goMainButton"
      class="submit-button"
      type="button"
    >
      На главную
    </button>

  </div>

</div>

<script type="module">

/*
================================
ПОДКЛЮЧАЕМ SUPABASE
================================
*/

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

/*
================================
ПОДКЛЮЧЕНИЕ К ПРОЕКТУ
================================
*/

const supabase = createClient(
  'https://fnodbpiwkkrdgqvmyanq.supabase.co',
  'sb_publishable_9GjllWmCfI2E7okWGOG9Wg_qCh8Gv6T'
)

/*
================================
ЭЛЕМЕНТЫ СТРАНИЦЫ
================================
*/

const statusText =
  document.getElementById('status')

const goIndexButton =
  document.getElementById('goIndexButton')

const goMainButton =
  document.getElementById('goMainButton')

/*
================================
ПРОВЕРКА ПОДТВЕРЖДЕНИЯ ПОЧТЫ
================================
*/

async function checkEmail() {

  statusText.textContent =
    'Проверяем...'

  statusText.className =
    'msg'

  const { data, error } =
    await supabase.auth.getUser()

  if (error || !data.user) {

    statusText.textContent =
      'Пользователь не найден'

    statusText.className =
      'msg error'

    return

  }

  const user =
    data.user

  /*
  ========================================
  ПРОВЕРЯЕМ ПОДТВЕРЖДЕНИЕ EMAIL
  ========================================
  */

  if (user.email_confirmed_at) {

    statusText.textContent =
      'Почта подтверждена'

    statusText.className =
      'msg success'

  }

  else {

    statusText.textContent =
      'Почта еще не подтверждена'

    statusText.className =
      'msg error'

  }

}

/*
================================
ПЕРЕХОД НА INDEX
================================
*/

function goIndex() {

  window.location.href =
    'index.html'

}

/*
================================
ПЕРЕХОД НА MAIN
================================
*/

function goMain() {

  window.location.href =
    'main.html'

}

goIndexButton.addEventListener('click', goIndex)
goMainButton.addEventListener('click', goMain)

/*
================================
ПРОВЕРЯЕМ СРАЗУ ПРИ ЗАГРУЗКЕ
================================
*/

checkEmail()

</script>

</body>
</html>
