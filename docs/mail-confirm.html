<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Подтверждение почты</title>

  <!--
  ========================================
  ОБЩИЕ СТИЛИ СТАРТОВЫХ СТРАНИЦ
  ========================================
  -->
  <link rel="stylesheet" href="styles/start.css" />

</head>

<body>

<header>
  <h1>Dating App MVP</h1>
</header>

<div class="container">

  <h2>Подтверждение почты</h2>

  <!--
  ========================================
  СТАТУС ПОДТВЕРЖДЕНИЯ
  ========================================
  -->

  <div id="statusMessage" class="msg">
    Проверяем статус...
  </div>

  <!--
  ========================================
  КНОПКИ ДЕЙСТВИЙ
  ========================================
  -->

  <div
    id="actionButtons"
    class="buttons"
    style="display: none;"
  >

    <!--
    ЕСЛИ РЕЗУЛЬТАТ = ДА
    -->

    <button
      id="toMain"
      class="submit-button"
      style="display: none;"
    >
      На main
    </button>

    <!--
    ЕСЛИ РЕЗУЛЬТАТ = НЕТ
    -->

    <button
      id="toLog"
      class="submit-button"
      style="display: none;"
    >
      На log
    </button>

    <!--
    ДОСТУПНО ВСЕГДА
    -->

    <button
      id="toIndex"
      class="secondary-button"
      style="display: none;"
    >
      На index
    </button>

  </div>

</div>

<script type="module">

/*
================================
ПОДКЛЮЧАЕМ SUPABASE
================================
*/

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://fnodbpiwkkrdgqvmyanq.supabase.co',
  'sb_publishable_9GjllWmCfI2E7okWGOG9Wg_qCh8Gv6T'
)

/*
================================
ЭЛЕМЕНТЫ СТРАНИЦЫ
================================
*/

const statusMessage =
  document.getElementById('statusMessage')

const actionButtons =
  document.getElementById('actionButtons')

const toMain =
  document.getElementById('toMain')

const toLog =
  document.getElementById('toLog')

const toIndex =
  document.getElementById('toIndex')

/*
================================
СКРЫТЬ ВСЕ КНОПКИ
================================
*/

function hideButtons() {

  actionButtons.style.display = 'none'

  toMain.style.display = 'none'
  toLog.style.display = 'none'
  toIndex.style.display = 'none'

}

/*
================================
ПОКАЗАТЬ КНОПКИ ДЛЯ УСПЕХА
================================
*/

function showSuccessButtons() {

  hideButtons()

  actionButtons.style.display = 'flex'

  toMain.style.display = 'block'
  toIndex.style.display = 'block'

}

/*
================================
ПОКАЗАТЬ КНОПКИ ДЛЯ НЕУСПЕХА
================================
*/

function showFailButtons() {

  hideButtons()

  actionButtons.style.display = 'flex'

  toLog.style.display = 'block'
  toIndex.style.display = 'block'

}

/*
================================
ПРОВЕРКА СТАТУСА ПОДТВЕРЖДЕНИЯ
================================
*/

async function checkEmailStatus() {

  hideButtons()

  statusMessage.textContent =
    'Проверяем статус...'

  statusMessage.className =
    'msg'

  const { data, error } =
    await supabase.auth.getUser()

  /*
  ЕСЛИ ПОЛЬЗОВАТЕЛЬ НЕ НАЙДЕН
  */

  if (error || !data.user) {

    statusMessage.textContent =
      'Пользователь не найден'

    statusMessage.className =
      'msg error'

    showFailButtons()
    return

  }

  const user =
    data.user

  /*
  ЕСЛИ ПОЧТА ПОДТВЕРЖДЕНА
  */

  if (user.email_confirmed_at) {

    statusMessage.textContent =
      'Почта подтверждена'

    statusMessage.className =
      'msg success'

    showSuccessButtons()
    return

  }

  /*
  ЕСЛИ ПОЧТА НЕ ПОДТВЕРЖДЕНА
  */

  statusMessage.textContent =
    'Почта не подтверждена'

  statusMessage.className =
    'msg error'

  showFailButtons()

}

/*
================================
ПЕРЕХОДЫ
================================
*/

toMain.addEventListener('click', function () {
  window.location.href = 'main.html'
})

toLog.addEventListener('click', function () {
  window.location.href = 'log.html'
})

toIndex.addEventListener('click', function () {
  window.location.href = 'index.html'
})

/*
================================
ЗАПУСК ПРОВЕРКИ ПРИ ЗАГРУЗКЕ
================================
*/

checkEmailStatus()

</script>

</body>
</html>
