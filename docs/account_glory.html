<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Аккаунт</title>
</head>
<body>

<h2>Заполните аккаунт</h2>

<div>
  <input id="name" type="text" placeholder="Ваше имя" />
</div>

<br>

<div>
  <select id="gender">
    <option value="">Выберите пол</option>
    <option value="male">Мужской</option>
    <option value="female">Женский</option>
  </select>
</div>

<br>

<div>
  <input id="birthday" type="date" />
</div>

<br>

<button onclick="saveAccount()">
Сохранить
</button>

<p id="status"></p>

<script type="module">
import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://fnodbpiwkkrdgqvmyanq.supabase.co',
  'sb_publishable_9GjllWmCfI2E7okWGOG9Wg_qCh8Gv6T'
)

const nameInput =
  document.getElementById('name')

const genderInput =
  document.getElementById('gender')

const birthdayInput =
  document.getElementById('birthday')

const statusText =
  document.getElementById('status')

const params =
  new URLSearchParams(window.location.search)

const userId =
  params.get('id')

const userEmail =
  params.get('email')

if (!userId || !userEmail) {

  statusText.textContent =
    'Не передан id или email'

}

async function saveAccount() {

  const name =
    nameInput.value.trim()

  const gender =
    genderInput.value

  const birthday =
    birthdayInput.value

  if (!userId || !userEmail) {

    statusText.textContent =
      'Нет данных пользователя'

    return

  }

  if (!name || !gender || !birthday) {

    statusText.textContent =
      'Заполни все поля'

    return

  }

  statusText.textContent =
    'Сохраняем...'

  const { error } =
    await supabase
      .from('accounts')
      .upsert({
        id: userId,
        email: userEmail,
        name: name,
        gender: gender,
        birthday: birthday
      })

  if (error) {

    statusText.textContent =
      'Ошибка: ' + error.message

    return

  }

  statusText.textContent =
    'Сохранено'

  window.location.href =
    'main.html'

}

window.saveAccount =
  saveAccount
</script>

</body>
</html>
