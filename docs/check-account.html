
<!DOCTYPE html>

<!-- СТИЛЬ КОНСОЛИ -->
  <link rel="stylesheet"
        href="styles/console.css" />
  

  <style>

      font-family: Arial, sans-serif;

    }

      background: #2563eb;

<body>

  <header>
    <h1>Dating App MVP</h1>
  </header>

  <div class="container">
    <div id="status" class="status">
      Проверяем аккаунт...
    </div>

    <div id="error" class="error"></div>

<!-- Задаем КНОПКИ -->
    
   <div class="actions">
  <button onclick="window.location.href='index.html'">
    На главную
  </button>

  <button
    id="fillAccountBtn"
    onclick="window.location.href='account.html'"
    style="display:none;"
  >
    Заполнить аккаунт
  </button>

  <button
    id="goMainBtn"
    onclick="window.location.href='main.html'"
    style="display:none;"
  >
    Перейти дальше
  </button>
</div>
  </div>


<!-- ========================================
     ПРОЦЕДУРА ПРОВЕРКИ АККАУНТА
======================================== -->
<script type="module">

import { supabase }
from './supabase-config.js'

const statusText =
  document.getElementById('status')

const errorText =
  document.getElementById('error')

const fillAccountBtn =
  document.getElementById('fillAccountBtn')

const goMainBtn =
  document.getElementById('goMainBtn')

/* ========================================
   ОБЯЗАТЕЛЬНЫЕ ПОЛЯ
======================================== */

const REQUIRED_FIELDS = [
  'email',
  'name',
  'gender',
  'birthday',
  'tel_number'
]

/* ========================================
   ПРОВЕРКА ПУСТЫХ ПОЛЕЙ
======================================== */

function hasEmptyFields(account) {

  for (const field of REQUIRED_FIELDS) {

    if (
      account[field] === null ||
      account[field] === undefined ||
      account[field] === ''
    ) {
      return true
    }

  }

  return false
}

/* ========================================
   ОСНОВНАЯ ПРОВЕРКА
======================================== */

async function checkAccount() {

  try {

    statusText.textContent =
      'Проверяем пользователя...'

    errorText.textContent = ''

    fillAccountBtn.style.display =
      'none'

    goMainBtn.style.display =
      'none'

    /* ---------- USER ---------- */

    const { data: userData, error: userError } =
      await supabase.auth.getUser()

    if (userError) {
      throw new Error(
        'Ошибка получения пользователя: ' +
        userError.message
      )
    }

    const user =
      userData.user

    if (!user) {

      statusText.textContent =
        'Пользователь не найден'

      return
    }

    if (!user.email_confirmed_at) {

      statusText.textContent =
        'Почта не подтверждена'

      return
    }

    statusText.textContent =
      'Проверяем аккаунт...'

    /* ---------- ACCOUNTS ---------- */

    const { data: account, error: selectError } =
      await supabase
        .from('accounts')
        .select('*')
        .eq('id', user.id)
        .maybeSingle()

    if (selectError) {
      throw new Error(
        'Ошибка чтения accounts: ' +
        selectError.message
      )
    }

    /* ---------- НЕТ ЗАПИСИ ---------- */

    if (!account) {

      statusText.textContent =
        'Аккаунт не найден'

      fillAccountBtn.style.display =
        'block'

      return
    }

    /* ---------- ЕСТЬ ПУСТЫЕ ПОЛЯ ---------- */

    if (hasEmptyFields(account)) {

      statusText.textContent =
        'Есть незаполненные поля'

      fillAccountBtn.style.display =
        'block'

      return
    }

    /* ---------- ВСЕ ЗАПОЛНЕНО ---------- */

    statusText.textContent =
      'Аккаунт готов'

    goMainBtn.style.display =
      'block'

  }

  catch (error) {

    console.error(error)

    statusText.textContent =
      'Ошибка проверки аккаунта'

    errorText.textContent =
      error.message

    fillAccountBtn.style.display =
      'block'

  }

}

/* ======================================== */

checkAccount()

</script>


<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

  <div class="row" id="build-top">

    <!-- ВВОД ВРУЧНУЮ -->

   изменение кнопок| v1.2.3

  </div>

  <div class="row" id="build-down">

    deploy: --

  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>

(function () {

  /* Текущая дата и время */

  const now = new Date();

  /* Добавляет ведущий ноль */

  const pad = n =>
    String(n).padStart(2, '0');

  /* Формат даты */

  const date =
      pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  /* Формат времени */

  const time =
      pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  /* Вывод в нижнюю строку */

  document
    .getElementById('build-down')
    .textContent =
      'deploy: '
      + date
      + ' '
      + time;

})();

</script>

</body>
</html>
