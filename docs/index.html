<!DOCTYPE html>
<html lang="ru">

<head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>MVP</title>

<link rel="stylesheet"
      href="styles/console.css" />

<style>

/* ========================= */
/* СБРОС */
/* ========================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ========================= */
/* BODY */
/* ========================= */

body {
  font-family: 'Playfair Display', Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* ========================= */
/* ТИТР ПОВЕРХ КАРТИНОК */
/* ========================= */

.header {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 0;
  background: transparent;
  z-index: 10;
  cursor: pointer;
}

/* ========================= */
/* LOGO */
/* ========================= */

.logo {
  position: absolute;
  top: 30px;              /* отдельно двигаешь logo */
  left: 50%;
  transform: translateX(-50%);
  height: 70px;
  width: auto;
  display: block;
  pointer-events: auto;
}

/* ========================= */
/* MVP */
/* ========================= */

.title {
  position: absolute;
  top: 105px;             /* отдельно двигаешь MVP */
  left: 50%;
  transform: translateX(-50%);
  font-size: 36px;
  font-weight: bold;
  line-height: 1;
  white-space: nowrap;
  pointer-events: auto;
}

/* ========================= */
/* ВЫПАДАЮЩИЙ БЛОК */
/* ========================= */

.mvp-lines {
  position: absolute;
  top: 145px;
  left: 50%;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;

  opacity: 0;
  transform: translate(-50%, 0);
  transition: transform 0.3s ease, opacity 0.3s ease;

  pointer-events: none;
  text-align: center;
}

/* ========================= */
/* СТРОКИ */
/* ========================= */

.mvp-lines span {
  font-size: 22px;
  font-weight: normal;
  color: #00008B;
  display: block;
  text-align: center;
}

/* ========================= */
/* MAIN HOVER */
/* ========================= */

.header:hover .mvp-lines {
  opacity: 1;
  transform: translate(-50%, 8px);
}

/* ========================= */
/* КОНТЕЙНЕР КАРТИНОК */
/* ========================= */

.images {
  position: relative;
  height: 100vh;
  display: flex;
  width: 100%;
  align-items: flex-start;
  overflow: hidden;
}

/* ========================= */
/* ЛЕВАЯ / ПРАВАЯ */
/* ========================= */

.image {
  width: 50%;
  height: 100%;
  position: relative;
  overflow: hidden;
  background-size: contain;
  background-position: top center;
  background-repeat: no-repeat;
  cursor: pointer;
  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease;
  box-shadow:
    0 8px 18px rgba(0,0,0,0.18);
}

.image:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow:
    0 16px 32px rgba(0,0,0,0.28);
}

/* ========================= */
/* ЭФФЕКТ НАЖАТИЯ */
/* ========================= */

.image:active {
  transform: translateY(2px) scale(0.98);
  box-shadow:
    0 4px 10px rgba(0,0,0,0.22);
  transition: transform 0.08s ease;
}
      
/* ========================= */
/* ЛЕВАЯ КАРТИНКА */
/* ========================= */

.left {
  background-image: url("https://matmodelator.github.io/Mvp/styles/dating.jpg");
}

/* ========================= */
/* ПРАВАЯ КАРТИНКА */
/* ========================= */

.right {
  background-image: url("https://matmodelator.github.io/Mvp/styles/dating.jpg");
}

/* ========================= */
/* ВТОРАЯ КАРТИНКА (ЭФФЕКТ ПЕСКА) */
/* ========================= */

.right::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("https://matmodelator.github.io/Mvp/styles/tennis.jpg");
  background-size: contain;
  background-position: top center;
  background-repeat: no-repeat;
  opacity: 0;
  filter: blur(8px) saturate(0.7) contrast(1.2);
  transform: scale(1.03);
  transition:
    opacity 0.5s ease,
    filter 0.5s ease,
    transform 0.5s ease;
  pointer-events: none;
  z-index: 1;
}

.right:hover::after {
  opacity: 1;
  filter: blur(0) saturate(1) contrast(1);
  transform: scale(1);
}

/* ========================= */
/* ЛЕВЫЙ HOVER */
/* ========================= */

.hover-left {
  position: absolute;
  top: 30px;
  left: 190px;
  background: none;
  font-size: 26px;
  font-weight: bold;
  color: #003366;
  padding: 0;
  white-space: nowrap;
  clip-path: inset(0 100% 0 0);
  transition: clip-path 0.4s ease;
  z-index: 2;
}

.left:hover .hover-left {
  clip-path: inset(0 0 0 0);
}

/* ========================= */
/* ПРАВЫЙ HOVER */
/* ========================= */

.hover-right {
  position: absolute;
  top: 30px;
  left: 200px;
  background: none;
  font-size: 26px;
  font-weight: bold;
  color: #003366;
  padding: 0;
  white-space: nowrap;
  clip-path: inset(0 100% 0 0);
  transition: clip-path 0.4s ease;
  z-index: 2;
}

.right:hover .hover-right {
  clip-path: inset(0 0 0 0);
}

/* ========================= */
/* COPYRIGHT */
/* ========================= */

.copyright {
  position: absolute;
  left: 0;
  bottom: 34px;
  width: 100%;
  text-align: center;
  padding: 10px 0;
  font-size: 14px;
  color: #444;
  background: rgba(248,248,248,0.92);
  border-top: 1px solid #ddd;
  z-index: 10;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 768px) {

  .logo {
    top: 20px;
    height: 56px;
  }

  .title {
    top: 88px;
    font-size: 28px;
  }

  .mvp-lines {
    top: 122px;
  }

  .images {
    flex-direction: column;
    height: 100vh;
  }

  .image {
    width: 100%;
    height: 50%;
  }

  .hover-left,
  .hover-right {
    left: 20px;
    top: 20px;
    font-size: 22px;
  }

}

</style>

</head>

<body>

<div class="header">

<img src="styles/logo.svg"
     alt="MVP logo"
     class="logo">
      
<div class="title">
MVP
</div>

<div class="mvp-lines">

<span>Most</span>
<span>Valuable</span>
<span>Project</span>

</div>

</div>

<div class="images">

<div class="image left" onclick="goSign('dating')">
<div class="hover-left">
Most Valuable Partner
</div>
</div>

<div class="image right" onclick="goSign('tennis')">
<div class="hover-right">
Most Valuable Player
</div>
</div>

</div>

<footer class="copyright">

© 2026 MatModelator/MVP — Most Valuable Project

</footer>
      
<div id="service-console">

<div class="row" id="build-top">

полный фикс от ИИ | v2.3.8

</div>

<div class="row" id="build-down">

deploy: --

</div>

</div>

<script>

function goSign(mode) {
  localStorage.setItem('mode', mode)
  window.location.href =
    'sign.html?mode=' + encodeURIComponent(mode)
}

(function () {

  const now = new Date();

  const pad = n =>
    String(n).padStart(2, '0');

  const date =
    pad(now.getDate())
    + '.'
    + pad(now.getMonth() + 1)
    + '.'
    + now.getFullYear();

  const time =
    pad(now.getHours())
    + ':'
    + pad(now.getMinutes());

  document
    .getElementById('build-down')
    .textContent =
    'deploy: '
    + date
    + ' '
    + time;

})();

</script>

</body>
</html>
