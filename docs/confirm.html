<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Подтверждение email</title>
</head>
<body>
  <h2>Подтверждение email...</h2>
  <p id="status">Проверяем код подтверждения...</p>

  <script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const client = createClient(
    "https://fnodbpiwkkrdgqvmyanq.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZub2RicGl3a2tyZGdxdm15YW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDk5MDAsImV4cCI6MjA4OTAyNTkwMH0.Gi4l3LAU3S4T77_2xgVWKmkeW34xblrJf04IlE4zu9I"
  );

  async function run() {
    document.body.innerHTML = "<h2>Подтверждение email...</h2>";

    // 1. Пробуем query
    const params = new URLSearchParams(window.location.search);
    let token = params.get("access_token");

    // 2. Пробуем hash
    if (!token) {
      const hash = new URLSearchParams(window.location.hash.substring(1));
      token = hash.get("access_token");
    }

    if (!token) {
      document.body.innerHTML += "<p>Ошибка: код подтверждения не найден.</p>";
      return;
    }

    const { data, error } = await client.auth.exchangeCodeForSession(token);

    if (error) {
      document.body.innerHTML += "<p>Ошибка: " + error.message + "</p>";
    } else {
      document.body.innerHTML += "<p>Email успешно подтверждён!</p>";
    }
  }

  run();
</script>
