<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Подтверждение email</title>
</head>
<body>
  <h2>Подтверждение email...</h2>
  <p id="status">Проверяем код подтверждения...</p>

  <!-- ⚠️ Подключение Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Подключение к Supabase
    const supabase = window.supabase.createClient(
      'https://fnodbpiwkkrdgqvmyanq.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZub2RicGl3a2tyZGdxdm15YW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDk5MDAsImV4cCI6MjA4OTAyNTkwMH0.Gi4l3LAU3S4T77_2xgVWKmkeW34xblrJf04IlE4zu9I'
    );

    // Получаем код из URL
    const url = new URL(window.location.href);
    const code = url.searchParams.get('code');

    if (!code) {
      document.getElementById('status').textContent =
        'Ошибка: код подтверждения не найден.';
    } else {
      supabase.auth.exchangeCodeForSession(code)
        .then(({ data, error }) => {
          if (error) {
            document.getElementById('status').textContent =
              'Ошибка подтверждения: ' + error.message;
          } else {
            document.getElementById('status').textContent =
              'Email успешно подтверждён! Теперь вы можете войти.';
          }
        });
    }
  </script>
</body>
</html>
