<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
</head>

<!-- ⚠️Подключение Supabase client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body>
  <h2>Регистрация нового пользователя</h2>

  <!-- ⚠️ Форма регистрации -->
  <form id="regForm">
    <label>Email:</label><br>
    <input id="email" type="email"><br><br>

    <label>Пароль:</label><br>
    <input id="password" type="password"><br><br>

    <button type="submit">Зарегистрироваться</button>
  </form>

  <p id="status"></p>

  <script>
    // ⚠️ ВСТАВЬ СВОИ ДАННЫЕ ПРОЕКТА
    const supabase = window.supabase.createClient(
      'https://fnodbpiwkkrdgqvmyanq.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZub2RicGl3a2tyZGdxdm15YW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDk5MDAsImV4cCI6MjA4OTAyNTkwMH0.Gi4l3LAU3S4T77_2xgVWKmkeW34xblrJf04IlE4zu9I'
    );

    // ⚠️Обработчик формы
    document.getElementById("regForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signUp({
        email,
        password
      });

      console.log(data, error);

      // ⚠️ Вывод результата
       if (error) {
        document.getElementById('status').textContent =
          'Ошибка: ' + error.message;
      } else {
        document.getElementById('status').textContent =
          'Письмо отправлено! Проверь почту.';
      }
   });
  </script>
</body>
</html>
