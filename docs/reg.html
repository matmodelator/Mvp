<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Регистрация</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: white;
    padding: 24px;
    border-radius: 10px;
}

input, select, textarea, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
}

button {
    background: #2563eb;
    color: white;
    border: none;
}
</style>

</head>
<body>

<div class="container">

<h2>Регистрация</h2>

<form id="form">

<input id="nickname" placeholder="Ник" required>

<input id="email" type="email" placeholder="Email" required>

<input id="password" type="password" placeholder="Пароль" required>

<input id="age" type="number" placeholder="Возраст">

<select id="gender">
<option value="">Пол</option>
<option value="male">Мужчина</option>
<option value="female">Женщина</option>
</select>

<select id="looking_for">
<option value="">Кого ищете</option>
<option value="male">Мужчину</option>
<option value="female">Женщину</option>
<option value="any">Не важно</option>
</select>

<input id="city" placeholder="Город">

<textarea id="bio" placeholder="О себе"></textarea>

<button type="submit">
Зарегистрироваться
</button>

</form>

<br>

<a href="log.html">
Назад к входу
</a>

</div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
'https://fnodbpiwkkrdgqvmyanq.supabase.co',
'sb_publishable_9GjllWmCfI2E7okWGOG9Wg_qCh8Gv6T'
)

const form = document.getElementById("form")

form.addEventListener("submit", async (e) => {

e.preventDefault()

const nickname =
document.getElementById("nickname").value

const email =
document.getElementById("email").value

const password =
document.getElementById("password").value

const age =
document.getElementById("age").value

const gender =
document.getElementById("gender").value

const looking_for =
document.getElementById("looking_for").value

const city =
document.getElementById("city").value

const bio =
document.getElementById("bio").value

const { data, error } =
await supabase.auth.signUp({
email,
password
})

if (error) {
alert(error.message)
return
}

const user = data.user

if (!user) {
alert("Проверь почту")
return
}

const { error: profileError } =
await supabase
.from("profiles")
.insert({
id: user.id,
email,
nickname,
age,
gender,
looking_for,
city,
bio
})

if (profileError) {
alert(profileError.message)
return
}

alert("Регистрация успешна")

window.location.href = "log.html"

})

</script>

</body>
</html>
