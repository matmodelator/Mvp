<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
</head>
<body>
  <h2>Регистрация нового пользователя</h2>

  <label>Email:</label><br>
  <input id="email" type="email"><br><br>

  <label>Пароль:</label><br>
  <input id="password" type="password"><br><br>

  <button id="signup">Зарегистрироваться</button>

  <p id="status"></p>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js';

    // ⚠️ ВСТАВЬ СВОИ ДАННЫЕ ПРОЕКТА
    const supabase = createClient(
      'https://fnodbpiwkkrdgqvmyanq.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZub2RicGl3a2tyZGdxdm15YW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDk5MDAsImV4cCI6MjA4OTAyNTkwMH0.Gi4l3LAU3S4T77_2xgVWKmkeW34xblrJf04IlE4zu9I'
    );

    document.getElementById('signup').onclick = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      document.getElementById('status').textContent = 'Отправка запроса...';

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: 'https://matmodelator.github.io/Mvp/confirm.html'
        }
      });

      if (error) {
        document.getElementById('status').textContent =
          'Ошибка: ' + error.message;
      } else {
        document.getElementById('status').textContent =
          'Письмо отправлено! Проверь почту.';
      }
    };
  </script>
</body>
</html>
