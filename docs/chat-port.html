<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8">
  <title>Вход в чат</title>

</head>

<body>

<h2>Вход в чат</h2>

<!-- ========================= -->
<!-- ВЫБОР МАСКИ -->
<!-- ========================= -->

<div class="group">

  <label>
    Выберите маску:
  </label>

  <br><br>

  <select id="maskSelect">

    <option>🦊 Лис</option>
    <option>🐺 Волк</option>
    <option>🐼 Панда</option>
    <option>🦉 Сова</option>
    <option>🐬 Дельфин</option>
    <option>🦁 Лев</option>
    <option>🐯 Тигр</option>
    <option>🦅 Орел</option>
    <option>🐉 Дракон</option>
    <option>🦄 Единорог</option>

  </select>

</div>

<br>

<!-- ========================= -->
<!-- ВЫБОР ЦВЕТА -->
<!-- ========================= -->

<div class="group">

  <label>
    Выберите цвет:
  </label>

  <br><br>

  <!-- Цвета -->

  <div style="color:#FF0000; cursor:pointer;"
       onclick="selectColor('#FF0000')">
    Red — #FF0000
  </div>

  <div style="color:#FFA500; cursor:pointer;"
       onclick="selectColor('#FFA500')">
    Orange — #FFA500
  </div>

  <div style="color:#FFD700; cursor:pointer;"
       onclick="selectColor('#FFD700')">
    Gold — #FFD700
  </div>

  <div style="color:#FFFF00; cursor:pointer;"
       onclick="selectColor('#FFFF00')">
    Yellow — #FFFF00
  </div>

  <div style="color:#00FF00; cursor:pointer;"
       onclick="selectColor('#00FF00')">
    Lime — #00FF00
  </div>

  <div style="color:#00FFFF; cursor:pointer;"
       onclick="selectColor('#00FFFF')">
    Cyan — #00FFFF
  </div>

  <div style="color:#1E90FF; cursor:pointer;"
       onclick="selectColor('#1E90FF')">
    Blue — #1E90FF
  </div>

  <div style="color:#FF00FF; cursor:pointer;"
       onclick="selectColor('#FF00FF')">
    Magenta — #FF00FF
  </div>

  <div style="color:#FF69B4; cursor:pointer;"
       onclick="selectColor('#FF69B4')">
    HotPink — #FF69B4
  </div>

  <div style="color:#FFFFFF; cursor:pointer;"
       onclick="selectColor('#FFFFFF')">
    White — #FFFFFF
  </div>

</div>

<br><br>

<!-- ========================= -->
<!-- КНОПКА -->
<!-- ========================= -->

<div class="group">

  <button onclick="enterChat()">
    Войти в чат
  </button>

</div>

<!-- ========================= -->
<!-- SCRIPT -->
<!-- ========================= -->

<script>

/*
выбранный цвет
*/

let selectedColor = null

function selectColor(color) {

  selectedColor = color

  console.log(
    'Выбран цвет:',
    color
  )

}

/*
вход в чат
*/

function enterChat() {

  const mask =
    document.getElementById(
      'maskSelect'
    ).value

  if (!selectedColor) {

    alert(
      'Выберите цвет'
    )

    return

  }

  localStorage.setItem(
    'chatMask',
    mask
  )

  localStorage.setItem(
    'chatColor',
    selectedColor
  )

  window.location.href =
    'public-chat.html'

}

</script>

</body>
</html>
