<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Аккаунт</title>
</head>
<body>

<h2>Заполните аккаунт</h2>

<div>
  <input id="name" type="text" placeholder="Ваше имя" />
</div>

<br>

<div>
  <select id="gender">
    <option value="">Выберите пол</option>
    <option value="male">Мужской</option>
    <option value="female">Женский</option>
  </select>
</div>

<br>

<div>
  <input id="birthday" type="date" />
</div>

<br>

<button onclick="saveAccount()">
Сохранить
</button>

<p id="status"></p>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://fnodbpiwkkrdgqvmyanq.supabase.co',
  'ТВОЙ_PUBLISHABLE_KEY'
)

const nameInput =
  document.getElementById('name')

const genderInput =
  document.getElementById('gender')

const birthdayInput =
  document.getElementById('birthday')

const statusText =
  document.getElementById('status')

async function saveAccount() {

  const name =
    nameInput.value.trim()

  const gender =
    genderInput.value

  const birthday =
    birthdayInput.value

  if (!name || !gender || !birthday) {

    statusText.textContent =
      'Заполни все поля'

    return

  }

  statusText.textContent =
    'Сохраняем...'

  /*
  Получаем пользователя
  */

  const { data, error } =
    await supabase.auth.getUser()

  if (error || !data.user) {

    statusText.textContent =
      'Пользователь не найден'

    return

  }

  const user =
    data.user

  /*
  Сохраняем в accounts
  */

  const { error: saveError } =
    await supabase
      .from('accounts')
      .upsert({
        id: user.id,
        name: name,
        gender: gender,
        birthday: birthday
      })

  if (saveError) {

    statusText.textContent =
      'Ошибка: ' + saveError.message

    return

  }

  statusText.textContent =
    'Сохранено'

  /*
  Переход на main
  */

  window.location.href =
    'main.html'

}

window.saveAccount =
  saveAccount

</script>

</body>
</html>
